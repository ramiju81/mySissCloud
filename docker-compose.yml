version: "3.8"

services:
  iris:
    image: intersystemsdc/iris-community:latest
    container_name: iris-mysisscloud
    ports:
      - "${IRIS_WEB_PORT:-52773}:52773"
      - "${IRIS_SUPERSERVER:-1972}:1972"
    volumes:
      - ./src:/opt/irisapp/src
      - ./scripts:/opt/irisapp/scripts
      - ./frontend:/usr/irissys/csp/mySissCloud
      - iris-data:/dur                    # Volumen persistente → elimina DBLatency
    environment:
      - ISC_DATA_DIRECTORY=/dur/irisdata  # IRIS guarda datos en el volumen
      - IRIS_USERNAME=${IRIS_USERNAME:-ABAP}
      - IRIS_PASSWORD=${IRIS_PASSWORD:-ABAPMYSISS}
    # NOTA: sin "command: --check-caps false" → causaba arranque no estándar
    healthcheck:
      # Corrección: "iris info" no existe en PATH. Usamos curl al portal web.
      test: ["CMD", "bash", "-c",
             "curl -sf http://localhost:52773/csp/sys/UtilHome.csp -o /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s   # IRIS tarda ~60s en arrancar por primera vez

volumes:
  iris-data:
    driver: local
