				.app-container {

				.sidebar {

				 font-weight: 500;
				 margin-bottom: 0.5rem;
				 transition: all 0.3s ease; /* Transición suave para hover */

				}
				
				/* == OPCIÓN MENU SELECCIONADA == */
				
				.nav-linkC{

				}

				/* ===== CONTENIDO PRINCIPAL ===== */
				
				.main-content {
				 flex: 1;/* Ocupa el espacio restante */

				 min-height: 100vh;
				 background-color: #ffffff;
				 position: relative;
				 height: auto;
				}
				
			    .app-container {
					display: flex; /* Layout flexbox para sidebar + contenido */

				 font-weight: bold;
				 color: var(--mysiss-purple);

				.container-title {

				.breadcrumb-container {

					align-items: center;
					gap: 8px;
					margin-bottom: 1.5rem;
					flex-wrap: wrap;
				}

					align-items: center;
					padding: 10px 20px;
					background: #f0f0f0;
					color: #666;
					border-radius: 25px;
					font-size: 14px;
					font-weight: 600;
					transition: all 0.3s ease;
					cursor: pointer;
					border: 2px solid transparent;
				}

				.breadcrumb-item:hover {
					background: var(--mysiss-light-purple);
					color: var(--mysiss-purple);
					transform: translateY(-2px);
				}

				.breadcrumb-item.active {
					background: var(--mysiss-purple);
					color: white;
					cursor: default;
					box-shadow: 0 4px 12px rgba(128, 0, 128, 0.3);
				}

				.breadcrumb-item.active:hover {
					transform: none;
				}

				.breadcrumb-separator {
					color: var(--mysiss-purple);
					font-size: 1.2rem;
					font-weight: bold;
				}

				/* Opcional: efecto de "disabled" para niveles futuros */
				.breadcrumb-item.disabled {
					opacity: 0.4;
					cursor: not-allowed;
					pointer-events: none;
				}

			    /* == FORMS == */
			    .form-group {
				 margin-bottom: 1rem;
				}

			    .form-label {
				 display: block;
				 margin-bottom: 0.5rem;
				 color: #374151;
				 font-weight: 500;
			    }

			    .form-input {
				 width: 100%;
				 padding: 0.5rem;
				 border: 1px solid #D1D5DB;
				 border-radius: 0.375rem;
				 font-size: 1rem;
				}

			    .form-input:focus {
				 outline: none;
				 border-color: var(--mysiss-purple);
				 box-shadow: 0 0 0 2px rgba(128, 0, 128, 0.1);
				}
				

				/* == GRID de 3 columnas para los campos del formulario de institución == */
				.form-gridCampos {
					display: grid;
					grid-template-columns: 1fr 1fr 1fr; /* 3 columnas */
					gap: 20px; /* Espacio entre elementos */
					margin-bottom: 25px;
				}
				
				/* == CONTENEDOR para cada campo del formulario == */
				
				.form-group {
					display: flex;
					flex-direction: column; /* Label arriba, input abajo */
				}
				
				.form-groupCheck{
				 display: flex;
				 text-align: center;
				}
				
				.column-groupCheck{
				 display: flex;
				 flex-direction:column;
				 margin: 0 auto;
				}


				/* == Estilos para las etiquetas == */
				
				.form-group label {
					font-weight: 600;
					margin-bottom: 6px;
					color: #333;
					font-size: 14px;
				}
				
				.form-groupCheck label{
					font-weight: 600;
					margin-bottom: 22px;
					color: #333;
					font-size: 14px;
				}

				/* == Estilos para inputs y selects == */
				
				.form-group input,
				.form-group select {
					padding: 12px;
					border: 2px solid #e1e5e9; /* Borde gris claro */
					border-radius: 8px;
					font-size: 14px;
					transition: all 0.3s ease; /* Transición suave */
					background-color: white;
				}
				
				.form-groupCheck input{
				  padding: 12px;
				  border: 2px solid #e1e5e9; /* Borde gris claro */
				  border-radius: 8px;
				  font-size: 14px;
				  transition: all 0.3s ease; /* Transición suave */
				  background-color: white;
				}
				
				.column-groupCheck input{
				  transform: scale(1.5);
				  justify-content: center;
				}
			    
				/* == TAMAÑO DE CHECKBOX == */
				
				/* == MODO EDITAR ==*/
				
				.data-table input[type="checkbox"].edit-input{
				 transform: scale(1.5); /* Aumenta el checkbox al 150% */
                 cursor: pointer; 
                 margin: 0 auto;
                 display: block;
				}
				
				/* == MODO VISUALIZAR ==*/
				
				.data-table input[type="checkbox"]:disabled {
                 transform: scale(1.5); /* Aumenta el tamaño al 150% */
                 cursor: not-allowed; 
                 margin: 0 auto; 
                 display: block;
                }

				/* Efecto focus en inputs */
				.form-group input:focus,
				.form-group select:focus {
					outline: none; 
					border-color: #8e44ad; /* Borde púrpura */
					box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1); /* Sombra púrpura sutil */
				}
				
				/* Botón Menú en la parte superior derecha */
				.menu-button {

				   top: 20px;
				   right: 20px;

				   color: white;
				   border: none;
				   padding: 12px 30px;
				   border-radius: 8px;
				   font-size: 16px;
				   font-weight: 600;
				   cursor: pointer;

				   gap: 10px; /*Espacio de 10px entre el icono y el texto*/
				   z-index: 1000;
				}
				
				.menu-button:hover {
				  transform: translateY(-2px);
				  box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
				  background: var(--mysiss-hover-purple);
				}

				.menu-button i {
				  font-size: 18px; /* Tamaño del icono ligeramente más grande que el texto */
				}

				/* Botón principal "Agregar" */
				.btn-agregar {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 30px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2); /* Sombra con color púrpura */
				}
				
				.btn-agregarFormulario,
				.btn-cancelarFormulario	{
				 background: var(--mysiss-purple);
				 color: white;
				 border: none;
				 padding: 8px 26px;
				 border-radius: 8px;
				 font-size: 15px;
				 font-weight: 700;
				 cursor: pointer;
				 transition: all 0.3s ease;
				 box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2); /* Sombra con color púrpura */
				}

				/* == Efecto hover del botón agregar == */
				
				.btn-agregar:hover, 
				.btn-agregarFormulario:hover,
				.btn-cancelarFormulario:hover {
					transform: translateY(-2px); /* Efecto de elevación */
					box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3); /* Sombra más intensa */
				}
				
				.modal-container{
				 display: none;
				 position: fixed;
				 z-index: 1;
				 left: 0; top: 0;
				 width: 100%; height: 100%;
				 background-color: rgba(0,0,0,0.6);
				 justify-content: center;
				 align-items: center;
				
				}
				
				.modal-content {
				  background-color: #fff;
				  padding: 30px;
				  border-radius: 8px;
				  width: 90%;
				  max-width: 700px;
				  text-align: center;
				  position: relative;
				}
				
				.close {
				 position: absolute;
				 top: 10px;
				 right: 15px;
				 font-size: 24px;
				 cursor: pointer;
				 color: var(--mysiss-purple);
				}
				
				/* ===== ESTILOS DE LA TABLA ===== */
				.table-container {
					background: white;
					border-radius: 12px;
					box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
					overflow: hidden; /* Para que el border-radius funcione correctamente */
				}

				/* Header de la tabla */
				.table-header {
					background: var(--mysiss-purple);
					color: white;
					padding: 20px;
					font-size: 18px;
					font-weight: 600;
				}

				/* Tabla de datos */
				.data-table {
					width: 100%;
					border-collapse: collapse; /* Elimina espacios entre celdas */
				}

				/* Celdas de la tabla */
				.data-table th,
				.data-table td {
					padding: 15px;
					text-align: center;
					vertical-align: middle;
					border-bottom: 1px solid #f0f0f0; /* Línea divisoria entre filas */
				}

				/* Headers de la tabla */
				.data-table th {
					background-color: #f8f9fa; /* Fondo gris claro */
					font-weight: 600;
					color: #333;
					font-size: 14px;
				}

				/* Efecto hover en las filas */
				.data-table tr:hover {
					background-color: #f8f9fa;
				}
				
				/* Checkbox personalizado para selección de filas */
				
				.data-table input[type="checkbox"].row-selector {
					transform: scale(1.3); /* Aumenta el tamaño del checkbox */
					cursor: pointer; 
					margin: 0 auto; /* Centra el checkbox */
					display: block;
				}

				/* Botón de navegación en breadcrumb habilitado */
				.breadcrumb-item.clickable {
					cursor: pointer;
				}

				.breadcrumb-item.clickable:hover {
					background: var(--mysiss-light-purple);
					color: var(--mysiss-purple);
					transform: translateY(-2px);
				}
				
				/* ===== BOTONES DE ACCIÓN ===== */
				
				.btn-action {
					padding: 6px 12px;
					border: none;
					border-radius: 6px;
					cursor: pointer;
					font-size: 12px;
					font-weight: 500;
					margin: 0 2px;
					transition: all 0.2s ease;
				}

				/* Botón editar (purple) */
				.btn-edit,
				.btn-options {
					background-color: var(--mysiss-purple);
					color: white;
				}

				.btn-edit:hover,
				.btn-options:hover{
					background-color: var(--mysiss-hover-purple);
				}

<!-- 				/* Botón eliminar (purple) */
				.btn-delete {
					background-color: var(--mysiss-purple);
					color: white;
				} -->

<!-- 				.btn-delete:hover {
					background-color: var(--mysiss-hover-purple);
				} -->

				/* Botón guardar (verde) */
				.btn-save {
					background-color: #27ae60;
					color: white;
				}

				.btn-save:hover {
					background-color: #229954; /* Verde más oscuro */
				}

				/* Botón cancelar (gris) */
				.btn-cancel {
					background-color: #95a5a6;
					color: white;
				}

				.btn-cancel:hover {
					background-color: #7f8c8d; /* Gris más oscuro */
				}
				
				/* Contenedor de botones en el header */
				.options-buttons {
					display: flex;
					gap: 10px;
				}
				
				/* Botón agregar línea */
				.btn-add-line {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 6px 12px;
					border-radius: 6px;
					font-size: 12px;
					font-weight: 500;
					cursor: pointer;
					transition: all 0.3s ease;
				}

				.btn-add-line:hover {
					background-color: var(--mysiss-hover-purple);
				}

				/* Botón salir */
				.btn-exit {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 6px 12px;
					border-radius: 6px;
					font-size: 12px;
					font-weight: 500;
					cursor: pointer;
					transition: all 0.3s ease;
				}

				.btn-exit:hover {
				 background-color: var(--mysiss-hover-purple);
				}

				/* ===== ESTADO VACÍO ===== */
				.empty-state {
					text-align: center;
					padding: 50px 20px;
					color: #666;
					font-style: italic;
				}
				
				/* ===== AGREGAR CAMPO ===== */
				.AgregarCampos{
				  padding: 20px 10px;
				}

				/* ===== ANIMACIONES ===== */
				
				.fade-in {
					animation: fadeIn 0.5s ease-in;
				}

				@keyframes fadeIn {
					from { 
						opacity: 0; 
						transform: translateY(20px); /* Aparece desde abajo */
					}
					to { 
						opacity: 1; 
						transform: translateY(0); 
					}
				}
				
				@keyframes slideUp {
					from {
						opacity: 0;
						transform: translateY(20px);
					}
					to {
						opacity: 1;
						transform: translateY(0);
					}
				}

				/* ===== DISEÑO RESPONSIVO ===== */
				
				@media (max-width: 768px) {
					/* En pantallas pequeñas, formulario en una sola columna */
					.form-grid {
						grid-template-columns: 1fr;
						gap: 15px;
					}
					
					/* Sidebar más pequeño */
					.sidebar {
						width: 200px;
					}
					
					/* Ajustar margen del contenido principal */
					.main-content {
						margin-left: 200px;
						padding: 20px;
					}
                }

            </style>
        </head>

					// Verificar si el código ya existe
					const codigoExiste = configDataC.some((record, index) => {
						// Si estamos editando, excluimos el registro actual de la validación
						if (editingIndexC >= 0 && index === editingIndexC) {
							return false;
						}
						// Comparamos sin distinguir mayúsculas/minúsculas
						return record.codigoCampo.toLowerCase() === codigoIngresado.toLowerCase();
					});
    
                    // Si el código ya existe, mostrar alerta y detener el proceso
                    if (codigoExiste) {
                      alert('El código de institución "' + codigoIngresado + '" ya está registrado. Por favor ingrese un código diferente.');
                      return; // Detiene la función aquí
                    }
    
					// Crear nuevo registro con los datos del formulario
					const newRecordC = {
						codigoCampo: codigoIngresado,
						nombre: formDataC.get('nombre'),
						nit: formDataC.get('nit'),
						pais: formDataC.get('pais'),
						departamento: formDataC.get('departamento'),
						ciudad: formDataC.get('ciudad'),
						direccion: formDataC.get('direccion'),
						telefono: formDataC.get('telefono'),
						correo: formDataC.get('correo'),
						activo: document.getElementById('activo').checked, 
						id: Date.now() // ID único basado en timestamp
					};
					
					// Verificar si estamos editando o agregando
					if (editingIndexC >= 0) {
						// MODO EDICIÓN
						newRecordC.id = configDataC[editingIndexC].id; // Mantener el ID original
						configDataC[editingIndexC] = newRecordC;
						editingIndexC = -1; // Resetear el índice de edición
					} else {
						// MODO AGREGAR
						newRecordC.id = Date.now(); // Generar nuevo ID
						configDataC.push(newRecordC);

				// ===== FUNCIÓN PRINCIPAL: AGREGAR/EDITAR REGISTRO SECCIÓN SERVICIOS =====

				function handleSubmitServicio(e) {
					
					e.preventDefault();
					
					const institution = configDataC[currentInstitutionIndex];
					const sede = sedesData[institution.id][currentSedeIndex];
					const formData = new FormData(e.target);
					
					// Obtener el código ingresado
					const codigoIngresado = formData.get('codigoServicio').trim();
					
					const servicios = serviciosData[sede.id] || [];
					const codigoExiste = servicios.some((servicio, index) => {
						// Si estamos editando, excluimos el servicio actual de la validación
						if (editingIndexServicio >= 0 && index === editingIndexServicio) {
							return false;
						}
						
						// Comparamos sin distinguir mayúsculas/minúsculas
						return servicio.codigo.toLowerCase() === codigoIngresado.toLowerCase();
					});
					
					// Si el código ya existe, mostrar alerta y detener el proceso
					if (codigoExiste) {
						alert('El código de servicio "' + codigoIngresado + '" ya está registrado. Por favor ingrese un código diferente.');
						return;
					}
					
					const newServicio = {
						codigo: formData.get('codigoServicio'),
						nombre: formData.get('nombreServicio'),
						usuario: formData.get('usuarioLider'),
						contacto: formData.get('contacto'),
						activo: document.getElementById('activoServicio').checked,
						id: Date.now()
					};
					
					if (editingIndexServicio >= 0) {
						// MODO EDICIÓN
						newServicio.id = serviciosData[sede.id][editingIndexServicio].id;
						serviciosData[sede.id][editingIndexServicio] = newServicio;
						editingIndexServicio = -1;
					} else {
						// MODO AGREGAR
						serviciosData[sede.id].push(newServicio);
					}
					
					renderTableServicios();
					closeServicioModal();
				}

					areaForm.addEventListener('submit', handleSubmitAreaF);
					
					// Renderizar tabla de área física
					renderTableAreaF();
				}
				
				// ===== RENDERIZAR TABLA ÁREA FÍSICA =====

				function renderTableAreaF() {
					
					const institution = configDataC[currentInstitutionIndex];
					const sede = sedesData[institution.id][currentSedeIndex];
					const service = serviciosData[sede.id][currentServicioIndex];
					const tableContent = document.getElementById('tableContentAreaF');
					const areaF = areaData[service.id] || [];
					
					if (areaF.length === 0) {
						tableContent.innerHTML = `
							<div class="empty-state">
								No hay datos registrados. Haga clic en "Agregar" para crear un nuevo registro.
							</div>
						`;
						return;
					}
					
					let tableHTML = `
						<table class="data-table">
							<thead>
								<tr>
									<th>Código</th>
									<th>Nombre</th>
									<th>Activo</th>
									<th>Acciones</th>
								</tr>
							</thead>
							<tbody>
					`;
					
					areaF.forEach((area, index) => {
						tableHTML += `
							<tr>
								<td>${area.codigo}</td>
								<td>${area.nombre}</td>
								<td>
									<input type="checkbox" ${area.activo ? 'checked' : ''} disabled>
								</td>
								<td>
									<button class="btn-action btn-edit" onclick="editAreaF(${index})">Editar</button>
								</td>
							</tr>
						`;
					});
					
					tableHTML += `
							</tbody>
						</table>
					`;
					
					tableContent.innerHTML = tableHTML;
				}
				
				// ===== FUNCIÓN PARA VOLVER A SECCIÓN SEDES =====

                function backToServices() {
    
					// Ocultar sección de área física
					document.getElementById('areaF-section').style.display = 'none';
					
					// Mostrar sección de servicios
					document.getElementById('servicios-section').style.display = 'block';
					
					// Resetear índice de servicio actual
					currentServicioIndex = -1;
					
					// Resetear índice de edición de área física
					editingIndexServicio = -1;
					
					// Resetear selección de servicios
					selectedServicioRow = -1;
					
					// Re-renderizar
					renderTableServicios();
				}
				
				// ===== FUNCIÓN PRINCIPAL: AGREGAR/EDITAR REGISTRO SECCIÓN SERVICIOS =====

				function handleSubmitAreaF(e) {
					
					e.preventDefault();
					
					const institution = configDataC[currentInstitutionIndex];
					const sede = sedesData[institution.id][currentSedeIndex];
					const service = serviciosData[sede.id][currentServicioIndex];
					const formData = new FormData(e.target);
					
					// Obtener el código ingresado
					const codigoIngresado = formData.get('codigoAreaF').trim();
					
					const areaF = areaData[service.id] || [];
					const codigoExiste = areaF.some((area, index) => {
						// Si estamos editando, excluimos el área actual de la validación
						if (editingIndexAfisica >= 0 && index === editingIndexAfisica) {
							return false;
						}

						// Comparamos sin distinguir mayúsculas/minúsculas
						return area.codigo.toLowerCase() === codigoIngresado.toLowerCase();
					});
					
					// Si el código ya existe, mostrar alerta y detener el proceso
					if (codigoExiste) {
						alert('El código del área física "' + codigoIngresado + '" ya está registrado. Por favor ingrese un código diferente.');
						return;
					}
					
					const newArea = {
						codigo: formData.get('codigoAreaF'),
						nombre: formData.get('nombreAreaF'),
						activo: document.getElementById('activoAreaF').checked,
						id: Date.now()
					};
					
					if (editingIndexAfisica >= 0) {
						// MODO EDICIÓN
						newArea.id = areaData[service.id][editingIndexAfisica].id;
						areaData[service.id][editingIndexAfisica] = newArea;
						editingIndexAfisica = -1;
					} else {
						// MODO AGREGAR
						areaData[service.id].push(newArea);
					}
					
					renderTableAreaF();
					closeAreaModal();
				}
				
				// ===== FUNCIONES MODAL ÁREA FÍSICA =====

				function openAreaModal() {
					
					const modal = document.getElementById('modal-container-areaF');
					const areaForm = document.getElementById('areaForm');
					
					areaForm.reset();
					editingIndexAfisica = -1;
					
					document.getElementById('areaF-modal-title').textContent = 'Agregar área física';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').textContent = 'Agregar';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').style.display = 'inline-block';
					document.querySelector('#modal-container-areaF .btn-cancelarFormulario').textContent = 'Cancelar';
					
					// Habilitar todos los campos
					const inputs = areaForm.querySelectorAll('input');
					inputs.forEach(input => input.disabled = false);
					
					modal.style.display = 'flex';
				}
				
				
				function closeAreaModal() {
					
					const modal = document.getElementById('modal-container-areaF');
					const areaForm = document.getElementById('areaForm');
					
					modal.style.display = 'none';
					editingIndexAfisica = -1;
					
					document.getElementById('areaF-modal-title').textContent = 'Agregar área física';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').textContent = 'Agregar';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').style.display = 'inline-block';
					document.querySelector('#modal-container-areaF .btn-cancelarFormulario').textContent = 'Cancelar';
					
					const inputs = areaForm.querySelectorAll('input');
					inputs.forEach(input => input.disabled = false);
					
					areaForm.reset();
				}
				
				// ===== FUNCIÓN EDITAR ÁREA FÍSICA =====

				function editAreaF(index) {
					
					const institution = configDataC[currentInstitutionIndex];
					const sede = sedesData[institution.id][currentSedeIndex];
					const servicio = serviciosData[sede.id][currentServicioIndex];
					const areaF = areaData[servicio.id] [index];
					const modal = document.getElementById('modal-container-areaF');
					
					editingIndexAfisica = index;
					
					document.getElementById('codigoAreaF').value = areaF.codigo;
					document.getElementById('nombreAreaF').value = areaF.nombre;
					document.getElementById('activoAreaF').checked = areaF.activo;
					
					// Asegurarse que todos los campos estén habilitados
					const inputs = document.getElementById('areaForm').querySelectorAll('input');
					inputs.forEach(input => input.disabled = false);
					
					document.getElementById('areaF-modal-title').textContent = 'Editar área física';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').textContent = 'Guardar';
					document.querySelector('#modal-container-areaF .btn-agregarFormulario').style.display = 'inline-block';
					document.querySelector('#modal-container-areaF .btn-cancelarFormulario').textContent = 'Cancelar';
					
					modal.style.display = 'flex';
				}
				
            </script>
        </body>
    </html>
