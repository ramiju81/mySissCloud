 <!DOCTYPE html>
    <html lang="es">
		<head>
			<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
			<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
			<title>mySiss - Auditoría</title>
			<link rel="icon" href="https://mysiss.com/wp-content/uploads/2024/02/favicon.png" sizes="32x32">
			<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
			<style>
			
				:root {
					--mysiss-purple: #800080;
					--mysiss-light-purple: #EBE3F2;
					--mysiss-hover-purple: #DFD1EE;
					--sidebar-width: 252px;
				}

				* {
					margin: 0;
					padding: 0;
					box-sizing: border-box;
				}

				body {
					font-family: system-ui, -apple-system, sans-serif;
					background: white;
					min-height: 100vh;
					overflow-x: hidden;
				}

				.app-container {
					display: flex;
					min-height: 100vh;
					overflow-x: hidden;
				}

				/* ===== SIDEBAR ===== */
				.sidebar {
					position: fixed;
					left: 0;
					top: 0;
					width: var(--sidebar-width);
					height: 100vh;
					overflow-y: auto;
					background: var(--mysiss-light-purple);
					padding: 0.8rem;
					z-index: 100;
					display: flex;
					flex-direction: column;
					justify-content: space-between;
				}

				.sidebar-top {
					flex-grow: 1;
					display: flex;
					flex-direction: column;
				}

				.sidebar-bottom {
					margin-top: auto;
					padding-top: 0.4rem;
				}

				.logo {
					font-size: 3.4rem;
					font-weight: bold;
					color: var(--mysiss-purple);
					margin-bottom: 1.5rem;
					text-align: center;
				}

				.nav-link {
					display: block;
					padding: 14px 24px;
					color: var(--mysiss-purple);
					text-decoration: none;
					border-radius: 0.5rem;
					font-weight: 500;
					margin-bottom: 0.5rem;
					transition: all 0.3s ease;
					cursor: pointer;
				}

				.nav-link:hover {
					background: var(--mysiss-hover-purple);
				}

				.nav-link.active {
					background: white;
				}

				/* ===== BOTÓN MENÚ ===== */
				.menu-button {
					position: absolute;
					top: 20px;
					right: 20px;
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 30px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
					text-decoration: none;
					display: inline-flex;
					align-items: center;
					margin-bottom:15px;
					gap: 10px;
					<!-- z-index: 1000; -->
				}

				.menu-button:hover {
					transform: translateY(-2px);
					box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
					background: var(--mysiss-hover-purple);
				}

				.menu-button i {
					font-size: 18px;
				}

				/* ===== CONTENIDO PRINCIPAL ===== */
				.main-content {
					margin-left: var(--sidebar-width);
					padding: 1rem 1.5rem;
					width: calc(100% - var(--sidebar-width));
					min-height: 100vh;
					display: flex;
					flex-direction: column;
					animation: slideUp 0.5s ease-out;
					overflow-x: hidden;
					overflow-y: auto;
				}

				.section-title {
					font-size: 2rem;
					font-weight: bold;
					color: var(--mysiss-purple);
					margin-bottom: 2.5rem;
				}

				/* ===== CONTENEDOR PRINCIPAL DE FILTROS ===== */
				.filters-wrapper {
					display: flex;
					flex-direction: column;
					gap: 2rem;
					flex: 1;
					max-width: 100%;
				}

				/* ===== SECCIÓN DE FILTROS MODO Y TIPO ===== */
				.filters-row {
					display: grid;
					grid-template-columns: 1fr 1fr;
					gap: 2.5rem;
					max-width: 100%;
				}

				.filter-card {
					background: white;
					padding: 1.5rem;
					border-radius: 12px;
					box-shadow: 0 2px 8px rgba(128, 0, 128, 0.1);
					max-width: 100%;
                    overflow: hidden;
				}

				.filter-card h2 {
					font-size: 1.1rem;
					font-weight: 600;
					color: #333;
					margin-bottom: 1.2rem;
				}

				.checkbox-group {
					display: flex;
					flex-direction: column;
					gap: 1.2rem;
				}

				.checkbox-item {
					display: flex;
					align-items: center;
					gap: 0.8rem;
				}

				.checkbox-item input[type="checkbox"] {
					width: 15px;
					height: 15px;
					cursor: pointer;
					<!-- accent-color: var(--mysiss-purple); -->
				}

				.checkbox-item label {
					font-size: 1rem;
					color: #333;
					cursor: pointer;
					user-select: none;
				}

				/* ===== SECCIÓN ORIGEN DEL ARCHIVO ===== */
				.file-section {
					background: white;
					padding: 1.5rem;
					border-radius: 12px;
					box-shadow: 0 2px 8px rgba(128, 0, 128, 0.1);
				}

				.file-section h2 {
					font-size: 1.1rem;
					font-weight: 600;
					color: #333;
					margin-bottom: 1rem;
				}

				.file-input-group {
					display: flex;
					flex-direction: column;
					gap: 1rem;
				}

				.file-checkbox {
					display: flex;
					align-items: center;
					gap: 0.8rem;
				}

				.file-checkbox input[type="checkbox"] {
					width: 15px;
					height: 15px;
					cursor: pointer;
				}

				.file-checkbox label {
					font-size: 1rem;
					color: #333;
					cursor: pointer;
					user-select: none;
				}

				.file-input-container {
					<!-- margin-left: 10px; -->
				}

				.file-input-container input[type="file"] {
					padding: 0.8rem;
					<!-- border: 2px dashed var(--mysiss-purple); -->
					border-radius: 8px;
					background: white;
					cursor: pointer;
					font-size: 0.95rem;
					width: 100%;
				}

				.file-input-container input[type="file"]::file-selector-button {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 0.4rem 1.3rem;
					border-radius: 6px;
					cursor: pointer;
					font-weight: 600;
					margin-right: 1rem;
					transition: all 0.3s ease;
				}

				.file-input-container input[type="file"]::file-selector-button:hover {
					background: var(--mysiss-hover-purple);
					color: white;
				}

				/* ===== BOTÓN EJECUTAR ===== */
				.action-container {
					display: flex;
					justify-content: flex-end;
				}

				.execute-button {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 38px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(128, 0, 128, 0.2);
				}

				.execute-button:hover {
					background: var(--mysiss-hover-purple);
					color: white;
					transform: translateY(-2px);
					box-shadow: 0 6px 20px rgba(128, 0, 128, 0.3);
				}
				
				/* ===== LOADER ===== */
				
				.loader-overlay {
					display: none;
					position: fixed;
					top: 0;
					left: 0;
					width: 100%;
					height: 100%;
					background: rgba(0, 0, 0, 0.7);
					z-index: 9999;
					justify-content: center;
					align-items: center;
				}

				.loader-content {
					background: white;
					padding: 3rem;
					border-radius: 16px;
					text-align: center;
					box-shadow: 0 10px 40px rgba(128, 0, 128, 0.3);
				}

				.spinner {
					width: 60px;
					height: 60px;
					border: 6px solid var(--mysiss-light-purple);
					border-top: 6px solid var(--mysiss-purple);
					border-radius: 50%;
					animation: spin 1s linear infinite;
					margin: 0 auto 1.5rem;
				}

				@keyframes spin {
					0% { transform: rotate(0deg); }
					100% { transform: rotate(360deg); }
				}

				.loader-content p {
					font-size: 1.2rem;
					color: var(--mysiss-purple);
					font-weight: 600;
					margin: 0;
				}

				/* ===== PANTALLA DE RESULTADOS ===== */
				
				.results-view {
					width: 100%;
					display: flex;
					flex-direction: column;
					gap: 2rem;
					margin-top: 80px;
				}

				.results-header {
					display: flex;
					justify-content: space-between;
					align-items: flex-start;
					background: white;
					padding: 1.5rem;
					border-radius: 12px;
					box-shadow: 0 2px 8px rgba(128, 0, 128, 0.1);
					margin-top: 0;
				}

				.header-info {
					flex: 1;
				}

				.header-info h2 {
					font-size: 1rem;
					color: var(--mysiss-purple);
					margin-bottom: 2rem;
				}

				.convenio-info {
					display: grid;
					grid-template-columns: repeat(4, 1fr); 
					gap: 1rem;
					align-items: start;
				}

				.info-item {
					display: flex;
					flex-direction: column;
					gap: 0.5rem;
				}

				.info-item label {
					font-size: 0.9rem;
					color: #000000;
					<!-- font-weight: 500; -->
				}

				.info-item input {
					padding: 6px;
					border: 1px solid #ddd;
					border-radius: 6px;
					font-size: 0.9rem;
					background: #f9f9f9;
				}

				.back-button {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 10px 24px;
					border-radius: 50px;
					font-size: 1rem;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					display: flex;
					align-items: center;
					gap: 0.5rem;
				}

				.back-button:hover {
					background: var(--mysiss-hover-purple);
					transform: translateX(-3px);
				}

				.results-table-container {
					background: white;
					padding: 1.5rem;
					border-radius: 12px;
					box-shadow: 0 2px 8px rgba(128, 0, 128, 0.1);
					overflow-x: auto;
				}

				.results-table {
					width: 100%;
					border-collapse: collapse;
					font-size: 0.9rem;
				}

				.results-table thead {
					background: #f8f9fa;
				}

				.results-table th {
					padding: 1rem;
					text-align: left;
					color: #333;
					font-weight: 600;
					<!-- border-bottom: 2px solid var(--mysiss-purple); -->
					white-space: nowrap;
				}

				.results-table td {
					padding: 10px;
					border-bottom: 1px solid #eee;
					vertical-align: middle;
				}

				.results-table tbody tr:hover {
					background: #f9f9f9;
				}

				.estado-cell {
					text-align: center;
				}

				.traffic-light-icon {
                    font-size: 1.2rem;
                }

                .traffic-light-icon.success {
                    color: #28a745;
                }

                .traffic-light-icon.error {
                    color: #dc3545;
                }

				.checkbox-cell {
					text-align: center;
				}

				.checkbox-cell input[type="checkbox"] {
					width: 16px;
					height: 16px;
				}

				.mensaje-cell {
					font-weight: 500;
				}

				.mensaje-success {
					color: #28a745;
				}

				.mensaje-error {
					color: #dc3545;
				}

				/* ===== RESPONSIVE ADICIONAL ===== */
				
				@media (max-width: 1024px) {
					.convenio-info {
						grid-template-columns: repeat(2, 1fr); /* 2 columnas en tablets */
					}

					.results-header {
						flex-direction: column;
						gap: 1.5rem;
					}

					.back-button {
						align-self: flex-start;
					}
				}

				@media (max-width: 768px) {
					.convenio-info {
						grid-template-columns: 1fr; /* 1 columna en móviles */
					}
					
					.results-table {
						font-size: 0.8rem;
					}

					.results-table th,
					.results-table td {
						padding: 0.6rem;
					}
				}
				
				/* ===== ANIMACIONES ===== */
				
				.fade-in {
					animation: fadeIn 0.5s ease-in;
				}

				@keyframes fadeIn {
					from {
						opacity: 0;
						transform: translateY(20px);
					}
					to {
						opacity: 1;
						transform: translateY(0);
					}
				}

				@keyframes slideUp {
					from {
						opacity: 0;
						transform: translateY(20px);
					}
					to {
						opacity: 1;
						transform: translateY(0);
					}
				}

				/* ===== RESPONSIVE ===== */
				@media (max-width: 1024px) {
					.filters-row {
						grid-template-columns: 1fr;
						gap: 2rem;
					}
				}

				@media (max-width: 768px) {
					.sidebar {
						width: 200px;
					}

					.main-content {
						margin-left: 200px;
						padding: 1.5rem;
					}

					.execute-button {
						width: 100%;
					}
				}
			</style>
		</head>
		<body>
			<!-- Botón menú -->
			<a href="../Auditoria.html" class="menu-button">
				<i class="fas fa-bars"></i>
				Menú
			</a>

			<div class="app-container">
				<!-- Sidebar -->
				<aside class="sidebar">
					<div class="sidebar-top">
						<div class="logo">mySiss</div>
						<nav>
							<a href="#" class="nav-link active"><strong>Cargar convenio</strong></a>
							<a href="AcuentasM-ConfConvenios.html" class="nav-link"><strong>Configurar convenio</strong></a>
							<a href="AcuentasM-Validaciones.html" class="nav-link"><strong>Validaciones</strong></a>
							<a href="AcuentasM-EstCuenta.html" class="nav-link"><strong>Estados de cuenta</strong></a>
							<a href="AcuentasM-Gauditoria.html" class="nav-link"><strong>Gestionar auditoría</strong></a>
							<a href="AcuentasM-Gestcorrec.html" class="nav-link"><strong>Gestionar correcciones</strong></a>
							<a href="AcuentasM-Resultados.html" class="nav-link"><strong>Resultados</strong></a>
						</nav>
					</div>
					<div class="sidebar-bottom">
						<a href="../loginA.html" class="nav-link"><strong>Cerrar sesión</strong></a>
					</div>
				</aside>

				<!-- Contenido Principal -->
				<main class="main-content">
					<h1 class="section-title">Cargar convenio</h1>

					<div class="filters-wrapper">
						<!-- Filtros Modo y Tipo -->
						<div class="filters-row">
							<!-- FILTRO 1: Modo de cargue -->
							<div class="filter-card">
								<h2>Modo</h2>
								<div class="checkbox-group">
									<div class="checkbox-item">
										<input type="checkbox" id="prueba" onclick="seleccionarUnico('modo', 'prueba')">
										<label for="prueba">Prueba</label>
									</div>
									<div class="checkbox-item">
										<input type="checkbox" id="real" onclick="seleccionarUnico('modo', 'real')">
										<label for="real">Real</label>
									</div>
								</div>
							</div>

							<!-- FILTRO 2: Tipo de cargue -->
							<div class="filter-card">
								<h2>Tipo</h2>
								<div class="checkbox-group">
									<div class="checkbox-item">
										<input type="checkbox" id="inicial" onclick="seleccionarUnico('tipo', 'inicial')">
										<label for="inicial">Inicial</label>
									</div>
									<div class="checkbox-item">
										<input type="checkbox" id="actualizacion" onclick="seleccionarUnico('tipo', 'actualizacion')">
										<label for="actualizacion">Actualización</label>
									</div>
								</div>
							</div>
						</div>

						<!-- SECCIÓN ORIGEN DEL ARCHIVO -->
						<div class="file-section">
							<h2>Origen del archivo</h2>
							<div class="file-input-group">
								<div class="file-checkbox">
									<input type="checkbox" id="archivoPC">
									<label for="archivoPC">Archivo desde PC</label>
								</div>
								<div class="file-input-container">
									<input type="file" id="fileInput" accept="*/*">
								</div>
							</div>
						</div>

						<!-- Botón Ejecutar -->
						<div class="action-container">
							<button class="execute-button" onclick="ejecutarCarga()">Ejecutar</button>
						</div>
					</div>
				</main>
			</div>

			<script>
				
				// Base de datos de aseguradoras
				const aseguradoras = [
					{ codigo: '001', nombre: 'Seguro de vida S.A', activo:'true' },
					{ codigo: '002', nombre: 'Colvida', activo:'true' },
					{ codigo: '003', nombre: 'Salud Corp', activo:'true' },
					{ codigo: '004', nombre: 'Mediseguros', activo:'true' },
					{ codigo: '005', nombre: 'Protección total', activo:'true' },
					{ codigo: '006', nombre: 'Salud total', activo:'true' },
					{ codigo: '007', nombre: 'EPS Sura', activo:'true' },
					{ codigo: '008', nombre: 'Compensar', activo:'true' },
					{ codigo: '009', nombre: 'Sanitas', activo:'true' },
					{ codigo: '010', nombre: 'Nueva EPS', activo:'true' },
					{ codigo: '011', nombre: 'Coomeva salud', activo:'true'}
				];
				
				function seleccionarUnico(grupo, seleccionado) {
					
					if (grupo === 'modo') {
						// Si selecciona "prueba", desmarcar "real"
						if (seleccionado === 'prueba') {
							document.getElementById('real').checked = false;
						}
						// Si selecciona "real", desmarcar "prueba"
						else if (seleccionado === 'real') {
							document.getElementById('prueba').checked = false;
						}
					}
					else if (grupo === 'tipo') {
						// Si selecciona "inicial", desmarcar "actualizacion"
						if (seleccionado === 'inicial') {
							document.getElementById('actualizacion').checked = false;
						}
						// Si selecciona "actualizacion", desmarcar "inicial"
						else if (seleccionado === 'actualizacion') {
							document.getElementById('inicial').checked = false;
						}
					}
				}
				
				function ejecutarCarga() {
					
					// Obtiene valores de los checkboxes
					const modoPrueba = document.getElementById('prueba').checked;
					const modoReal = document.getElementById('real').checked;
					const tipoInicial = document.getElementById('inicial').checked;
					const tipoActualizacion = document.getElementById('actualizacion').checked;
					const archivoPC = document.getElementById('archivoPC').checked;
					const fileInput = document.getElementById('fileInput');

					// Validaciones
					if (!modoPrueba && !modoReal) {
						alert('Por favor seleccione un modo (Prueba o Real).');
						return;
					}

					if (!tipoInicial && !tipoActualizacion) {
						alert('Por favor seleccione un tipo (Inicial o Actualización).');
						return;
					}

					if (!archivoPC){
					    alert('Por favor seleccione el origen del archivo');
						return;
					}
					
					if (archivoPC && !fileInput.files.length){
						alert('Por favor seleccione el archivo a cargar');
						return;
					}
					
					// Valida extensión del archivo
					const file = fileInput.files[0];
					const fileName = file.name;
					const extension = fileName.split('.').pop().toLowerCase();
					
					if (extension !== 'xlsx') {
						alert('Error: Solo se permiten archivos con extensión .xlsx');
						return;
					}
					
					// Definir modo y tipo
					const modo = modoPrueba ? 'Prueba' : 'Real';
					const tipo = tipoInicial ? 'Inicial' : 'Actualización';
					
					// Mostrar loader
					document.getElementById('loader').style.display = 'flex';

					// Leer archivo XLSX
					const reader = new FileReader();
					
					reader.onload = function(e) {
						try {
							// Lee el archivo con SheetJS
							const data = new Uint8Array(e.target.result);
							const workbook = XLSX.read(data, {type: 'array'});
							
							// Obtiene la primera hoja
							const firstSheetName = workbook.SheetNames[0];
							const worksheet = workbook.Sheets[firstSheetName];
							
							// Convierte a JSON
							const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
							
							// Valida que tenga contenido
							if (jsonData.length < 10) {
								alert('Error: El archivo no contiene la estructura correcta (mínimo 10 filas)');
								document.getElementById('loader').style.display = 'none';
								return;
							}

							// Extrae DATOS DEL ENCABEZADO (filas 0-6, columna B = índice 1)
							const idConvenio = jsonData[0][1] || '';
                            const nombreConvenio = jsonData[1][1] || '';
							
							// Valida campos obligatorios del encabezado
							if (!idConvenio || idConvenio.toString().trim() === '') {
								alert('Campo ID Convenio debe ser obligatorio para cargar un convenio');
								document.getElementById('loader').style.display = 'none';
								return;
							}

							if (!nombreConvenio || nombreConvenio.toString().trim() === '') {
								alert('Campo Nombre convenio debe ser obligatorio para cargar un convenio');
								document.getElementById('loader').style.display = 'none';
								return;
							}
							
							// Función para convertir fecha de Excel a formato DD/MM/AAAA
							function convertirFechaExcel(valorFecha) {
								if (!valorFecha) return '';
								
								// Si ya es una fecha en formato texto, devolverla tal cual
								if (typeof valorFecha === 'string' && valorFecha.includes('/')) {
									return valorFecha;
								}
								
								// Si es un número (serial de Excel)
								if (typeof valorFecha === 'number') {
									// Excel cuenta los días desde el 1 de enero de 1900
									// JavaScript cuenta milisegundos desde el 1 de enero de 1970
									const fechaExcel = new Date((valorFecha - 25569) * 86400 * 1000);
									
									const dia = String(fechaExcel.getDate()).padStart(2, '0');
									const mes = String(fechaExcel.getMonth() + 1).padStart(2, '0');
									const anio = fechaExcel.getFullYear();
									
									return `${dia}/${mes}/${anio}`;
								}
								
								return valorFecha.toString();
							}

							const fechaInicio = convertirFechaExcel(jsonData[2][1]);
							const fechaFin = convertirFechaExcel(jsonData[3][1]);
							const contacto = jsonData[4][1] || '';
							const codigoResponsable  = jsonData[5][1] || '';
							const estadoConvenio = jsonData[6][1] || '';
							
							//Valida responsable obligatorio
							if (!codigoResponsable || codigoResponsable.toString().trim() === '') {
								alert('Campo Responsable de pago debe ser obligatorio para cargar un convenio');
								document.getElementById('loader').style.display = 'none';
								return;
							}
							
							//Obtiene configuración de responsables de pago
							let responsablesPago = [];
							const rPagosGuardados = localStorage.getItem('RPagos');
							if (rPagosGuardados) {
								try {
									responsablesPago = JSON.parse(rPagosGuardados);
								} catch (error) {
									console.error('Error al parsear RPagos, usando aseguradoras por defecto:', error);
									responsablesPago = aseguradoras;
								}
							}else {
								//Si no existe RPagos en localStorage, usar aseguradoras
								responsablesPago = aseguradoras;
							}
							
							//Busca responsable por código
							const responsableEncontrado = responsablesPago.find(r => r.codigo === codigoResponsable.toString());
							
							// Valida que exista el responsable
							if (!responsableEncontrado) {
								alert('La aseguradora ' + codigoResponsable + ' no existe.');
								document.getElementById('loader').style.display = 'none';
								return;
							}
							
							// Valida que esté activo
							if (responsableEncontrado.activo !== 'true' && responsableEncontrado.activo !== true) {
								alert('La aseguradora ' + codigoResponsable + ' no se encuentra activa.');
								document.getElementById('loader').style.display = 'none';
								return;
							}
							
							//Usa nombre responsable
							const responsable = responsableEncontrado.nombre;
							
							// EXTRAER POSICIONES (desde fila 9 en adelante, fila 8 son los encabezados)
							const headers = jsonData[8]; // Encabezados de posiciones
							const rows = jsonData.slice(9); // Datos de posiciones

							// Procesar cada posición
							const posiciones = [];
							const posicionesParaGuardar = [];
							
							rows.forEach((row, index) => {
								// Validar que la fila tenga contenido
								if (!row || row.length === 0 || !row[0]) {
									return; // Saltar filas vacías
								}

								const posicion = {
									posicion: index + 1,
									codigoServicio: row[0] || '',
									descripcion: row[1] || '',
									tarifa: row[2] || '',
									observacion: row[3] || '',
									autorizacion: (row[4] && row[4].toString().toUpperCase() === 'X') ? true : false,
									catalogoDiagnostico: row[5] ? row[5].toString() : '',
									codigoDiagnostico: row[6] || '',
									mensaje: '',
									estado: 'success'
								};

								// Validar campos obligatorios
								if (!posicion.codigoServicio) {
									posicion.mensaje = 'Campo código servicio obligatorio';
									posicion.estado = 'error';
								} else if (!posicion.descripcion) {
									posicion.mensaje = 'Campo descripción obligatorio';
									posicion.estado = 'error';
								} else if (!posicion.tarifa) {
									posicion.mensaje = 'Campo tarifa obligatorio';
									posicion.estado = 'error';
								} else {
									posicion.mensaje = 'Posición cargada correctamente';
									posicion.estado = 'success';
								}

								posiciones.push(posicion);
								
								// Solo agregar a posicionesParaGuardar si no tiene errores
								if (posicion.estado === 'success') {
									const posicionParaGuardar = {
										posicion: posicion.posicion,
										codigoServicio: posicion.codigoServicio,
										descripcion: posicion.descripcion,
										tarifa: posicion.tarifa,
										observacion: posicion.observacion,
										autorizacion: posicion.autorizacion,
										catalogoDiagnostico: posicion.catalogoDiagnostico ? posicion.catalogoDiagnostico.toString() : '',
										codigoDiagnostico: posicion.codigoDiagnostico
									};
									posicionesParaGuardar.push(posicionParaGuardar);
								}
							});

							// Crear objeto con todos los datos
							const convenioData = {
								modo: modo,
								tipo: tipo,
								idConvenio: idConvenio,
								nombreConvenio: nombreConvenio,
								fechaInicio: fechaInicio,
								fechaFin: fechaFin,
								contacto: contacto,
								responsable: responsable,
								estadoConvenio: estadoConvenio,
								posiciones: posiciones,
								fechaCarga: new Date().toLocaleString('es-CO')
							};

							// Guardar en localStorage SOLO si el modo es "Real"
							if (modo === 'Real') {
								const convenioDataParaGuardar = {
									idConvenio: idConvenio,
									nombreConvenio: nombreConvenio,
									fechaInicio: fechaInicio,
									fechaFin: fechaFin,
									contacto: contacto,
									responsable: responsable,
									estadoConvenio: estadoConvenio,
									posiciones: posicionesParaGuardar,
									fechaCarga: new Date().toLocaleString('es-CO')
								};
								
								// Obtener convenios existentes o crear array vacío
								let convenios = [];
								const conveniosGuardados = localStorage.getItem('conveniosActuales');
								if (conveniosGuardados) {
									try {
										convenios = JSON.parse(conveniosGuardados);
										// Si no es un array, convertirlo en array
										if (!Array.isArray(convenios)) {
											convenios = [convenios];
										}
									} catch (error) {
										console.error('Error al parsear convenios:', error);
										convenios = [];
									}
								}
								
								if (tipo === 'Inicial') {
									// MODO INICIAL: Verificar que no exista el convenio
									const indiceExistente = convenios.findIndex(c => c.idConvenio === idConvenio);
									
									if (indiceExistente !== -1) {
										alert('El convenio con el ID "' + idConvenio + '" ya existe. Use modo Actualización para modificarlo.');
										document.getElementById('loader').style.display = 'none';
										return;
									} else {
										// Agregar el nuevo convenio
										convenios.push(convenioDataParaGuardar);
									}
								} else if (tipo === 'Actualización') {
									// MODO ACTUALIZACIÓN: Actualizar el convenio existente
									const indice = convenios.findIndex(c => c.idConvenio === idConvenio);
									
									if (indice !== -1) {
										// Actualizar el convenio
										convenios[indice] = convenioDataParaGuardar;
									} else {
										alert('El convenio con el ID "' + idConvenio + '" no existe. Use modo Inicial para crearlo.');
										document.getElementById('loader').style.display = 'none';
										return;
									}
								}
								
								// Guardar array completo en localStorage
								localStorage.setItem('conveniosActuales', JSON.stringify(convenios));
							}

							// Ocultar loader y mostrar resultados después de 1.5 segundos
							setTimeout(() => {
								document.getElementById('loader').style.display = 'none';
								mostrarPantallaResultados(convenioData);
							}, 1500);

						} catch (error) {
							console.error('Error al procesar el archivo:', error);
							alert('Error al procesar el archivo: ' + error.message);
							document.getElementById('loader').style.display = 'none';
						}
					};

					reader.onerror = function(error) {
						console.error('Error al leer el archivo:', error);
						alert('Error al leer el archivo');
						document.getElementById('loader').style.display = 'none';
					};

					// Iniciar lectura del archivo
					reader.readAsArrayBuffer(file);
				}
				
				function mostrarPantallaResultados(data) {
					
					// Ocultar pantalla inicial
					document.querySelector('.filters-wrapper').style.display = 'none';
					document.querySelector('.section-title').style.display = 'none';

					// Crear HTML de la pantalla de resultados
					const mainContent = document.querySelector('.main-content');
					
					// Crear contenedor de resultados
					const resultsView = document.createElement('div');
					resultsView.className = 'results-view fade-in';
					resultsView.innerHTML = `
						<div class="results-header">
							<div class="header-info">
								<h2>Proceso ejecutado modo: ${data.modo} (${data.tipo})</h2>
								<div class="convenio-info">
									<div class="info-item">
										<label>ID convenio</label>
										<input type="text" value="${data.idConvenio}" readonly>
									</div>
									<div class="info-item">
										<label>Nombre convenio</label>
										<input type="text" value="${data.nombreConvenio}" readonly>
									</div>
									<div class="info-item">
										<label>Fecha inicio</label>
										<input type="text" value="${data.fechaInicio}" readonly>
									</div>
									<div class="info-item">
										<label>Fecha fin</label>
										<input type="text" value="${data.fechaFin}" readonly>
									</div>
									<div class="info-item">
										<label>Responsable de pago</label>
										<input type="text" value="${data.responsable}" readonly>
									</div>
									<div class="info-item">
										<label>Contacto</label>
										<input type="text" value="${data.contacto}" readonly>
									</div>
									<div class="info-item">
										<label>Estado</label>
										<input type="text" value="${data.estadoConvenio}" readonly>
									</div>
								</div>
							</div>
							<button class="back-button" onclick="volverAtras()">
								<i class="fas fa-arrow-left"></i> Atrás
							</button>
						</div>
						<div class="results-table-container">
							<table class="results-table">
								<thead>
									<tr>
										<th>Estado</th>
										<th>Posición</th>
										<th>Código servicio</th>
										<th>Descripción</th>
										<th>Tarifa</th>
										<th>Observación</th>
										<th>Autorización</th>
										<th>Catálogo diagnóstico</th>
										<th>Código diagnóstico</th>
										<th>Mensaje</th>
									</tr>
								</thead>
								<tbody>
									${data.posiciones.length > 0 ? data.posiciones.map(pos => `
									<tr>
										<td class = "estado-cell">
											<div class="semaforo">
											   <i class="fas fa-circle traffic-light-icon ${pos.estado === 'success' ? 'success' : 'error'}"></i>
											</div>
										</td>
										<td>${pos.posicion}</td>
										<td>${pos.codigoServicio}</td>
										<td>${pos.descripcion}</td>
										<td>${pos.tarifa}</td>
										<td>${pos.observacion}</td>
										<td class="checkbox-cell">
											<input type="checkbox" ${pos.autorizacion ? 'checked' : ''} disabled>
										</td>
										<td>${pos.catalogoDiagnostico}</td>
										<td>${pos.codigoDiagnostico}</td>
										<td class="mensaje-cell ${pos.estado === 'success' ? 'mensaje-success' : 'mensaje-error'}">
											${pos.mensaje}
										</td>
									</tr>
									`).join('') : `
										<tr>
											<td colspan="10" style="text-align: center; padding: 2rem; color: #666; font-style: italic;">
												No se agregaron posiciones al convenio
											</td>
										</tr>
									`}
                                </tbody>
							</table>
						</div>
					`;
					
					
					mainContent.appendChild(resultsView);
				}
				
				function volverAtras() {
					// Eliminar vista de resultados
					const resultsView = document.querySelector('.results-view');
					if (resultsView) {
						resultsView.remove();
					}

					// Mostrar pantalla inicial
					document.querySelector('.filters-wrapper').style.display = 'flex';
					document.querySelector('.section-title').style.display = 'block';

					// Limpiar formulario
					document.getElementById('fileInput').value = '';
				}
				
			</script>
			<div id="loader" class="loader-overlay">
                <div class="loader-content">
                    <div class="spinner"></div>
                    <p>Cargando convenio...</p>
                </div>
            </div>
		</body>
