 <!DOCTYPE html>
    <html lang="es">
        <head>
			<!-- Font Awesome para iconos - librería de iconos gratuita -->
			<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
			<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
			<title>mySiss - Auditoría</title>
			<link rel="icon" href="https://mysiss.com/wp-content/uploads/2024/02/favicon.png" sizes="32x32">
            <style>
			
                :root {
					--mysiss-purple: #800080;
					--mysiss-light-purple: #EBE3F2;
					--mysiss-hover-purple: #DFD1EE;
                }
				
				/* ===== RESET Y ESTILOS GLOBALES ===== */
				
				*{
					margin: 0;
					padding: 0;
					box-sizing: border-box;
				}

				body {
				    font-family: system-ui, -apple-system, sans-serif;
					background: white;
					min-height: 100vh;
				}

				.focus-outline:focus {
					outline: 2px solid var(--mysiss-purple);
					outline-offset: 2px;
				}

				/* == Layout == */
				.app-container {
				    display: flex;
					min-height: 100vh;
				}

				/* == Sidebar == */
				.sidebar {
					position:fixed;
					left:0;
					top:0;
					width: 252px;
					height: 100vh;
					overflow-y: auto;
					background: var(--mysiss-light-purple);
					padding: 0.8rem;
					z-index: 100;
					display: flex;
					flex-direction: column;
					justify-content: space-between; /* Distribuye el espacio entre logo/menú y cerrar sesión */
				}
				
				.sidebar-top {
				    flex-grow: 1; /* Ocupa el espacio disponible */
				    display: flex;
				    flex-direction: column;
				}

				/* == Contenedor para el botón de cerrar sesión que siempre estará al fondo == */
				
				.sidebar-bottom {
				    margin-top: auto; /* Empuja este elemento hacia abajo */
				    padding-top: 0.4rem; /* Espacio superior */
				}
				
				.logo {
					font-size: 3.4rem;
					font-weight: bold;
					color: var(--mysiss-purple);
					margin-bottom: 1.5rem;
					text-align: center;
				}

				.nav-link {
					display: block;
					padding: 14px 24px;
					color: var(--mysiss-purple);
					text-decoration: none;
					border-radius: 0.5rem;
					font-weight: 500;
					margin-bottom: 0.5rem;
					transition: all 0.3s ease; /* Transición suave para hover */
					/*border-left: 4px solid transparent;  Borde izquierdo invisible por defecto */
					cursor: pointer;
				}
				
				.nav-link:hover {
					background: var(--mysiss-hover-purple);
				}
				
				.nav-link.active {
					background: white;
				}
				
				/* ===== CONTENEDOR DE BOTONES SUPERIORES ===== */
				
				.topButtons {
					position: absolute; /* Posición fija en la pantalla */
					top: 20px;
					right: 20px;
					display: flex;
					gap: 15px; /* Espacio entre botones */
					align-items: center;
					z-index: 1000;
				}

				/* ===== BOTÓN MENU ===== */

				.menu-button {
				    background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 30px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
					text-decoration: none;
					display: inline-flex;
					align-items: center;
					gap: 10px;
					z-index: 1000;
				}
				
				.menu-button:hover {
				    transform: translateY(-2px);
				    box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
				    background: var(--mysiss-hover-purple);
				}
				
				/* Estilo para el icono del menú hamburguesa */
				
				.menu-button i {
				    font-size: 18px; /* Tamaño del icono ligeramente más grande que el texto */
				}
				
				/* ===== CONTENIDO PRINCIPAL ===== */
				
			    .main-content {
                  margin-left: 252px;
                  padding: 1rem 1.5rem;
                  width: calc(100% - 252px);
                  min-height: 100vh;
                }

                /* Título principal de la sección */
                .section-title {
                    font-size: 2rem;
                    font-weight: bold;
                    color: var(--mysiss-purple);
				    margin-top: 1rem;
                    margin-bottom: 1rem;
                }
				
				
				/* ===== DISEÑO RESPONSIVO ===== */

				/* Tablets y pantallas medianas (hasta 1024px) */
				@media (max-width: 1024px) {
					.sidebar {
						width: 200px;
					}
					
					.main-content {
						margin-left: 200px;
						width: calc(100% - 200px);
					}
					
					.logo {
						font-size: 2.8rem;
					}
				}

				/* Tablets pequeñas (hasta 768px) */
				@media (max-width: 768px) {
					.sidebar {
						position: fixed;
						left: -252px;
						transition: left 0.3s ease;
					}
					
					.sidebar.active {
						left: 0;
					}
					
					.main-content {
						margin-left: 0;
						width: 100%;
						padding: 1rem;
					}
					
					.filtersContainer {
						grid-template-columns: 1fr;
						gap: 1rem;
					}
					
					.menu-button {
						top: 10px;
						right: 10px;
						padding: 10px 20px;
					}
					
					.section-title {
						font-size: 1.5rem;
						margin-top: 3rem;
					}
					
					.results-table {
						font-size: 12px;
					}
					
					.results-table th,
					.results-table td {
						padding: 0.3rem;
					}
				}

				/* Móviles (hasta 480px) */
				@media (max-width: 480px) {
					.logo {
						font-size: 2.2rem;
					}
					
					.nav-link {
						padding: 10px 16px;
						font-size: 0.9rem;
					}
					
					.filterTitle {
						font-size: 0.9rem;
					}
					
					.form-field {
						flex-direction: column;
						align-items: flex-start;
					}
					
					.form-field label {
						min-width: auto;
						margin-bottom: 0.3rem;
					}
					
					.input-with-icon {
						width: 100%;
					}
					
					.form-field input,
					#caso {
						width: 100%;
					}
					
					.search-button {
						width: 100%;
						padding: 0.6rem 1rem;
					}
					
					.action-buttons {
						flex-direction: column;
					}
					
					.action-btn {
						width: 100%;
					}
					
					.results-table {
						font-size: 10px;
					}
					
					.modal-content {
						width: 95%;
						padding: 1rem;
					}
				}

            </style>
        </head>

                <!-- Sidebar -->
                <aside class="sidebar">

                        <div class="logo">mySiss</div> <!-- Logo mysiss -->

                        </nav>
					</div>

        </body>
