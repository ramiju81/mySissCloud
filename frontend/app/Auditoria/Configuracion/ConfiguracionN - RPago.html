	<!DOCTYPE html>
	<html lang="es">
		<head>
			<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
			<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
			<title>mySiss - Auditoría</title>
			<link rel="icon" href="https://mysiss.com/wp-content/uploads/2024/02/favicon.png" sizes="32x32">
			<style>
				:root {
					--mysiss-purple: #800080;
					--mysiss-light-purple: #EBE3F2;
					--mysiss-hover-purple: #DFD1EE;
				}

				* {
					margin: 0;
					padding: 0;
					box-sizing: border-box;
				}

				body {
					font-family: system-ui, -apple-system, sans-serif;
					background: white;
					min-height: 100vh;
				}

				/* == Layout == */
				.app-container {
					display: flex;
					min-height: 100vh;
				}

				/* == Sidebar == */
				.sidebar {
					position: fixed;
					left: 0;
					top: 0;
					width: 190px;
					height: 100vh;
					overflow-y: auto;
					background: var(--mysiss-light-purple);
					padding: 0.8rem;
					z-index: 100;
					display: flex;
					flex-direction: column;
					justify-content: space-between;
				}

				.sidebar-top {
					flex-grow: 1;
					display: flex;
					flex-direction: column;
				}

				.sidebar-bottom {
					margin-top: auto;
					padding-top: 1rem;
				}

				.logo {
					font-size: 3.1rem;
					font-weight: bold;
					color: var(--mysiss-purple);
					margin-bottom: 2rem;
					text-align: center;
				}

				.nav-link {
					display: block;
					padding: 15px 25px;
					color: var(--mysiss-purple);
					text-decoration: none;
					border-radius: 0.5rem;
					font-weight: 500;
					margin-bottom: 0.5rem;
					transition: all 0.3s ease;
					cursor: pointer;
				}

				.nav-linkG {
					display: block;
					padding: 15px 25px;
					color: var(--mysiss-purple);
					text-decoration: none;
					border-radius: 0.5rem;
					font-weight: 500;
					margin-bottom: 0.5rem;
					cursor: pointer;
					background: white;
				}

				.nav-link:hover {
					background: var(--mysiss-hover-purple);
				}

				/* ===== CONTENIDO PRINCIPAL ===== */
				.main-content {
					flex: 1;
					padding: 30px;
					margin-left: 190px;
					min-height: 100vh;
					background-color: #ffffff;
				}

				.section-title {
					font-size: 1.875rem;
					font-weight: bold;
					color: var(--mysiss-purple);
					margin-bottom: 2rem;
				}

				/* == BOTÓN MENÚ == */
				.menu-button {
					position: fixed;
					top: 20px;
					right: 20px;
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 30px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
					text-decoration: none;
					display: inline-flex;
					align-items: center;
					gap: 10px;
					z-index: 1000;
				}

				.menu-button:hover {
					transform: translateY(-2px);
					box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
					background: var(--mysiss-hover-purple);
				}

				.menu-button i {
					font-size: 18px;
				}

				/* ===== ESTILOS DE LA TABLA ===== */
				.table-container {
					background: white;
					border-radius: 12px;
					box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
					overflow: hidden;
					margin-bottom: 25px;
				}

				.data-table {
					width: 100%;
					border-collapse: collapse;
				}

				.data-table th,
				.data-table td {
					padding: 15px;
					text-align: left;
					border-bottom: 1px solid #f0f0f0;
				}

				.data-table th {
					background-color: #f8f9fa;
					font-weight: 600;
					color: #333;
					font-size: 14px;
				}

				.data-table tbody tr:hover {
					background-color: #f8f9fa;
				}

				/* Centrar la columna de Activo */
				.data-table th:nth-child(3),
				.data-table td:nth-child(3) {
					text-align: center;
				}

				/* Checkbox en modo visualizar */
				.data-table input[type="checkbox"]:disabled {
					transform: scale(1.5);
					cursor: not-allowed;
					margin: 0 auto;
					display: block;
				}

				/* Checkbox en modo editar */
				.data-table input[type="checkbox"]:not(:disabled) {
					transform: scale(1.5);
					cursor: pointer;
					margin: 0 auto;
					display: block;
				}

				/* Input de texto en modo edición */
				.data-table input[type="text"] {
					width: 100%;
					padding: 8px;
					border: 2px solid #e1e5e9;
					border-radius: 6px;
					font-size: 14px;
				}

				.data-table input[type="text"]:focus {
					outline: none;
					border-color: var(--mysiss-purple);
					box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
				}

				/* ===== BOTONES DE ACCIÓN ===== */
				.btn-action {
					padding: 4px 8px;
					border: none;
					border-radius: 6px;
					cursor: pointer;
					font-size: 12px;
					font-weight: 500;
					margin: 0 4px;
					transition: all 0.2s ease;
				}

				.btn-edit {
					background-color: var(--mysiss-purple);
					color: white;
				}

				.btn-edit:hover {
					background-color: var(--mysiss-hover-purple);
				}

				.btn-save {
					background-color: #27ae60;
					color: white;
				}

				.btn-save:hover {
					background-color: #229954;
				}

				.btn-cancel {
					background-color: #95a5a6;
					color: white;
				}

				.btn-cancel:hover {
					background-color: #7f8c8d;
				}

				/* BOTÓN PRINCIPAL "Agregar" */
				
				.btn-agregar {
                    background: var(--mysiss-purple);
                    color: white;
                    border: none;
                    padding: 8px 26px;
                    border-radius: 8px;
                    font-size: 14px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: all 0.3s ease;
                    box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
                }

                .btn-agregar:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
                }

                /* Contenedor para los botones superiores */
                .buttons-container {
                    display: flex;
                    gap: 15px;
                    justify-content: flex-end;
                }

				/* ===== ANIMACIONES ===== */
				.fade-in {
					animation: fadeIn 0.5s ease-in;
				}

				@keyframes fadeIn {
					from {
						opacity: 0;
						transform: translateY(20px);
					}
					to {
						opacity: 1;
						transform: translateY(0);
					}
				}

				/* ===== DISEÑO RESPONSIVO ===== */
				@media (max-width: 768px) {
					.sidebar {
						width: 200px;
					}

					.main-content {
						margin-left: 200px;
						padding: 20px;
					}
				}
			</style>
		</head>
		<body>
			<!-- Botón menú -->
			<a href="Auditoria.html" class="menu-button">
				<i class="fas fa-bars"></i>
				Menú
			</a>

			<div class="app-container">
				<!-- Sidebar -->
				<aside class="sidebar">
					<div class="sidebar-top">
						<div class="logo">mySiss</div>
						<nav>
							<a href="ConfiguracionN - institucion.html" class="nav-link"><strong>Instituciones</strong></a>
							<a href="ConfiguracionN - campos.html" class="nav-link"><strong>Campos</strong></a>
							<a href="#" class="nav-linkG"><strong>Responsable de pago</strong></a>
						</nav>
					</div>
					<div class="sidebar-bottom">
						<a href="loginA.html" class="nav-link"><strong>Cerrar sesión</strong></a>
					</div>
				</aside>

				<main class="main-content">
					<section id="general-section" class="fade-in">
						<h2 class="section-title">Responsables de pago</h2>

						<!-- ===== CONTENEDOR DE LA TABLA ===== -->
						<div class="table-container">
							<table class="data-table">
								<thead>
									<tr>
										<th>Código</th>
										<th>Nombre</th>
										<th>Activo</th>
										<th>Acciones</th>
									</tr>
								</thead>
								<tbody id="tableBody">
									<!-- Las filas se generarán dinámicamente -->
								</tbody>
							</table>
						</div>
						
						<!-- Contenedor de botones -->
                        <div class="buttons-container">
                            <button class="btn-agregar" onclick="cargarResponsables()">Cargar</button>
                            <button class="btn-agregar" onclick="agregarResponsable()">Agregar</button>
                        </div>
						
					</section>
				</main>
			</div>

			<script>
			
				// Datos iniciales de responsables de pago
				
				let responsables = [
					{ codigo: '001', nombre: 'Seguros de vida S.A.', activo: true },
					{ codigo: '002', nombre: 'Colvida', activo: true },
					{ codigo: '003', nombre: 'Salud Corp', activo: true },
					{ codigo: '004', nombre: 'Mediseguros', activo: true },
					{ codigo: '005', nombre: 'Protección total', activo: true },
					{ codigo: '006', nombre: 'Salud plus', activo: true}
				];

				let editingIndex = null;
				
				// Carga datos desde localStorage al iniciar
				
				function inicializarResponsables() {
					
					const datosGuardados = localStorage.getItem('RPagos');
					
					if (datosGuardados) {
						responsables = JSON.parse(datosGuardados);
					}else{
					    // Si no hay datos guardados, guarda los datos iniciales
						localStorage.setItem('RPagos', JSON.stringify(responsables));
					}
				
				}
				
				// Función para guardar en localStorage
				function guardarEnLocalStorage() {
				    localStorage.setItem('RPagos', JSON.stringify(responsables));
				}
				
				inicializarResponsables();

				// Función para renderizar la tabla
				
				function renderTabla() {
					const tbody = document.getElementById('tableBody');
					tbody.innerHTML = '';

					responsables.forEach((resp, index) => {
						const tr = document.createElement('tr');
						
						if (editingIndex === index) {
							// Modo edición
							tr.innerHTML = `
								<td><input type="text" value="${resp.codigo}" id="edit-codigo-${index}"></td>
								<td><input type="text" value="${resp.nombre}" id="edit-nombre-${index}"></td>
								<td><input type="checkbox" ${resp.activo ? 'checked' : ''} id="edit-activo-${index}"></td>
								<td>
									<button class="btn-action btn-save" onclick="guardarEdicion(${index})">Guardar</button>
									<button class="btn-action btn-cancel" onclick="cancelarEdicion()">Cancelar</button>
								</td>
							`;
						} else {
							// Modo visualización
							tr.innerHTML = `
								<td>${resp.codigo}</td>
								<td>${resp.nombre}</td>
								<td><input type="checkbox" ${resp.activo ? 'checked' : ''} disabled></td>
								<td>
									<button class="btn-action btn-edit" onclick="editarResponsable(${index})">Editar</button>
								</td>
							`;
						}
						
						tbody.appendChild(tr);
					});
				}

				// Función para editar un responsable
				
				function editarResponsable(index) {
					editingIndex = index;
					renderTabla();
				}

				// Función para guardar la edición
				
				function guardarEdicion(index) {
					const codigo = document.getElementById(`edit-codigo-${index}`).value.trim();
					const nombre = document.getElementById(`edit-nombre-${index}`).value.trim();
					const activo = document.getElementById(`edit-activo-${index}`).checked;

					if (!codigo || !nombre) {
						alert('Por favor, complete todos los campos.');
						return;
					}
					
					// Validar que el código no esté duplicado
                    const codigoDuplicado = responsables.some((resp, idx) => 
                        idx !== index && resp.codigo === codigo
                    );

                    if (codigoDuplicado) {
                        alert('El código de responsable de pago "' + codigo + '" ya está registrado. Por favor, ingrese un código diferente.');
                        return;
                    }
					
					responsables[index] = { codigo, nombre, activo };
					editingIndex = null;
					renderTabla();
					guardarEnLocalStorage();
				}

				// Función para cancelar la edición
				function cancelarEdicion() {
				    
					if (editingIndex !== null) {
                        const responsable = responsables[editingIndex];
                        if (responsable.codigo === '' && responsable.nombre === '') {
                            responsables.splice(editingIndex, 1);
                        }
                    }
				
					editingIndex = null;
					renderTabla();
				}

				// Función para agregar un nuevo responsable
				function agregarResponsable() {
					const nuevoResponsable = {
						codigo: '',
						nombre: '',
						activo: false
					};

					responsables.push(nuevoResponsable);
					editingIndex = responsables.length - 1;
					renderTabla();

					// Scroll hasta el final de la tabla
					window.scrollTo(0, document.body.scrollHeight);
				}
				
				// Función para cargar responsables (sin implementar aún)
                function cargarResponsables() {
                    // Por implementar
                    alert('Función cargar presionada');
                }

				// Renderizar la tabla al cargar la página
				renderTabla();
			</script>
        </body>
    </html>
