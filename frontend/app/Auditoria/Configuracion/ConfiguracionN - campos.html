    <!DOCTYPE html>
    <html lang="es">
        <head>
            <!-- Font Awesome para iconos - librería de iconos gratuita -->
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>mySiss - Auditoría</title>
            <link rel="icon" href="https://mysiss.com/wp-content/uploads/2024/02/favicon.png" sizes="32x32">
            <style>
			
                :root {
					--mysiss-purple: #800080;
					--mysiss-light-purple: #EBE3F2;
					--mysiss-hover-purple: #DFD1EE;
                }
	
				*{
					margin: 0;
					padding: 0;
					box-sizing: border-box;
				}

				body {
					font-family: system-ui, -apple-system, sans-serif;
					background: white;
					min-height: 100vh;
				}

				.focus-outline:focus {
					outline: 2px solid var(--mysiss-purple);
					outline-offset: 2px;
				}

				/* == Layout == */
				
				.app-container {
				 display: flex;
				 min-height: 100vh;
				}

				/* == Sidebar == */
				
				.sidebar {
				 position:fixed;
				 left:0;
				 top:0;
				 width: 190px;
				 height: 100vh;
				 overflow-y: auto;
				 background: var(--mysiss-light-purple);
				 padding: 0.8rem;
				 z-index: 100;
				 display: flex;
				 flex-direction: column;
				 justify-content: space-between; /* Distribuye el espacio entre logo/menú y cerrar sesión */
				}
				
				.sidebar-top {
				 flex-grow: 1; /* Ocupa el espacio disponible */
				 display: flex;
				 flex-direction: column;
				}
				
				/* == CONTENEDOR para el botón de cerrar sesión que siempre estará al fondo == */
				
				.sidebar-bottom {
				 margin-top: auto; /* Empuja este elemento hacia abajo */
				 padding-top: 1rem; /* Espacio superior */
				}

				.logo {
				 font-size: 3.1rem;
				 font-weight: bold;
				 color: var(--mysiss-purple);
				 margin-bottom: 2rem;
				 text-align: center;
				}

				.nav-link {
				 display: block;
				 padding: 15px 25px;
				 color: var(--mysiss-purple);
				 text-decoration: none;
				 border-radius: 0.5rem;
				 font-weight: 500;
				 margin-bottom: 0.5rem;
				 transition: all 0.3s ease; /* Transición suave para hover */
				 cursor: pointer;
				}
				
				/* == OPCIÓN MENU SELECCIONADA == */
				
				.nav-linkG{
				 display: block;
				 padding: 15px 25px;
				 color: var(--mysiss-purple);
				 text-decoration: none;
				 border-radius: 0.5rem;
				 font-weight: 500;
				 margin-bottom: 0.5rem;
				 <!-- transition: all 0.3s ease; /* Transición suave para hover */ -->
				 /*border-left: 4px solid transparent;  Borde izquierdo invisible por defecto */
				 cursor: pointer;
				 background: white;
				
				}
				
				.nav-link:hover {
				 background: var(--mysiss-hover-purple);
				}

				/* ===== CONTENIDO PRINCIPAL ===== */
				
				.main-content {
				 flex: 1;/* Ocupa el espacio restante */
				 padding: 30px;
				 margin-left: 190px; /* Espacio para el sidebar fijo */
				 min-height: 100vh;
				 background-color: #ffffff;
				 position: relative;
				 height: auto;
				}
				
			    .app-container {
					display: flex; /* Layout flexbox para sidebar + contenido */
					min-height: 100vh; /* Altura mínima de toda la ventana */
					position: relative;
				}
				
			    .section-title {
				 font-size: 1.875rem;
				 font-weight: bold;
				 color: var(--mysiss-purple);
				 margin-bottom: 1rem;
				}

			    /* == FORMS == */
			    .form-group {
				 margin-bottom: 1rem;
				}

			    .form-label {
				 display: block;
				 margin-bottom: 0.5rem;
				 color: #374151;
				 font-weight: 500;
			    }

			    .form-input {
				 width: 100%;
				 padding: 0.5rem;
				 border: 1px solid #D1D5DB;
				 border-radius: 0.375rem;
				 font-size: 1rem;
				}

			    .form-input:focus {
				 outline: none;
				 border-color: var(--mysiss-purple);
				 box-shadow: 0 0 0 2px rgba(128, 0, 128, 0.1);
				}
				

				/* == GRID de 2 columnas para los campos del formulario campos == */
				.form-gridCampos {
					display: grid;
					grid-template-columns: 1fr 1fr; /* 3 columnas */
					gap: 20px; /* Espacio entre elementos */
					margin-bottom: 25px;
				}
				
				/* == CONTENEDOR para cada campo del formulario == */
				
				.form-group {
					display: flex;
					flex-direction: column; /* Label arriba, input abajo */
				}
				
				.form-groupCheck{
				 display: flex;
				 text-align: center;
				}
				
				.column-groupCheck{
				 display: flex;
				 flex-direction:column;
				 margin: 0 auto;
				}

				.options-section {
					display: none; /* Oculto por defecto */
					background: white;
					border-radius: 12px;
					box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
					margin-top: 30px;
					padding: 20px;
					animation: slideUp 1.2s ease-out; /* Animación de aparición */
				}

				/* == Estilos para las etiquetas == */
				
				.form-group label {
					font-weight: 600;
					margin-bottom: 6px;
					color: #333;
					font-size: 14px;
				}
				
				.form-groupCheck label{
					font-weight: 600;
					margin-bottom: 22px;
					color: #333;
					font-size: 14px;
				}

				/* == Estilos para inputs y selects == */
				
				.form-group input,
				.form-group select {
					padding: 12px;
					border: 2px solid #e1e5e9; /* Borde gris claro */
					border-radius: 8px;
					font-size: 14px;
					transition: all 0.3s ease; /* Transición suave */
					background-color: white;
				}
				
				.form-groupCheck input{
				  padding: 12px;
				  border: 2px solid #e1e5e9; /* Borde gris claro */
				  border-radius: 8px;
				  font-size: 14px;
				  transition: all 0.3s ease; /* Transición suave */
				  background-color: white;
				}
				
				.column-groupCheck input{
				  transform: scale(1.5);
				  justify-content: center;
				}
			    
				/* == TAMAÑO DE CHECKBOX == */
				
				/* == MODO EDITAR ==*/
				
				.data-table input[type="checkbox"].edit-input{
				 transform: scale(1.5); /* Aumenta el checkbox al 150% */
                 cursor: pointer;
                 margin: 0 auto;
                 display: block;
				}
				
				/* == MODO VISUALIZAR ==*/
				
				.data-table input[type="checkbox"]:disabled {
                 transform: scale(1.5); /* Aumenta el tamaño al 150% */
                 cursor: not-allowed;
                 margin: 0 auto;
                 display: block;
                }

				/* Efecto focus en inputs */
				.form-group input:focus,
				.form-group select:focus {
					outline: none; 
					border-color: #8e44ad;
					box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1); /* Sombra púrpura sutil */
				}
				
				/* Botón Menú en la parte superior derecha */
				.menu-button {
				    position: absolute;
				    top: 20px;
				    right: 20px;
				    background: var(--mysiss-purple);
				    color: white;
				    border: none;
				    padding: 12px 30px;
				    border-radius: 8px;
				    font-size: 16px;
				    font-weight: 600;
				    cursor: pointer;
				    transition: all 0.3s ease;
				    box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2);
				    text-decoration: none;
				    display: inline-flex; /*alinear icono y texto*/
				    align-items: center; /*Centra verticalmente el icono y texto*/
				    gap: 10px; /*Espacio de 10px entre el icono y el texto*/
				    z-index: 1000;
				}
				
				.menu-button:hover {
				    transform: translateY(-2px);
				    box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3);
				    background: var(--mysiss-hover-purple);
				}
				
				/* Estilo para el icono del menú hamburguesa */
				.menu-button i {
				  font-size: 18px; /* Tamaño del icono ligeramente más grande que el texto */
				}

				/* Botón principal "Agregar" */
				.btn-agregar {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 12px 30px;
					border-radius: 8px;
					font-size: 16px;
					font-weight: 600;
					cursor: pointer;
					transition: all 0.3s ease;
					box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2); /* Sombra con color púrpura */
				}
				
				.btn-agregarFormulario,
				.btn-cancelarFormulario	{
				 background: var(--mysiss-purple);
				 color: white;
				 border: none;
				 padding: 8px 26px;
				 border-radius: 8px;
				 font-size: 14px;
				 font-weight: 700;
				 cursor: pointer;
				 transition: all 0.3s ease;
				 box-shadow: 0 4px 15px rgba(142, 68, 173, 0.2); /* Sombra con color púrpura */
				}

				/* == Efecto hover del botón agregar == */
				
				.btn-agregar:hover, 
				.btn-agregarFormulario:hover,
				.btn-cancelarFormulario:hover {
					transform: translateY(-2px); /* Efecto de elevación */
					box-shadow: 0 6px 20px rgba(142, 68, 173, 0.3); /* Sombra más intensa */
				}
				
				.modal-container{
				 display: none;
				 position: fixed;
				 z-index: 1;
				 left: 0; top: 0;
				 width: 100%; height: 100%;
				 background-color: rgba(0,0,0,0.6);
				 justify-content: center;
				 align-items: center;
				
				}
				
				.modal-content {
					background-color: #fff;
					padding: 30px;
					border-radius: 8px;
					width: 90%;
					max-width: 600px;
					text-align: center;
					position: relative;
				}
				
				.close {
				    position: absolute;
					top: 10px;
					right: 15px;
					font-size: 24px;
					cursor: pointer;
					color: var(--mysiss-purple);
				}
				
				/* ===== ESTILOS DE LA TABLA ===== */
				.table-container {
					background: white;
					border-radius: 12px;
					box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
					overflow: hidden; /* Para que el border-radius funcione correctamente */
				}

				/* Header de la tabla */
				.table-header {
					background: var(--mysiss-purple);
					color: white;
					padding: 20px;
					font-size: 18px;
					font-weight: 600;
				}

				/* Tabla de datos */
				.data-table {
					width: 100%;
					border-collapse: collapse; /* Elimina espacios entre celdas */
				}

				/* Celdas de la tabla */
				.data-table th,
				.data-table td {
					padding: 15px;
					text-align: center;
					vertical-align: middle;
					border-bottom: 1px solid #f0f0f0; /* Línea divisoria entre filas */
				}

				/* Headers de la tabla */
				.data-table th {
					background-color: #f8f9fa; /* Fondo gris claro */
					font-weight: 600;
					color: #333;
					font-size: 14px;
				}

				/* Efecto hover en las filas */
				.data-table tr:hover {
					background-color: #f8f9fa;
				}
				
				/* Centrar checkboxes en las columnas Activo y Obligatorio */
				
				.data-table td:nth-child(4),
				.data-table td:nth-child(5),
				.data-table th:nth-child(4),
				.data-table th:nth-child(5) {
					text-align: center;
					vertical-align: middle;
				}
				
				/* Header de la sección opciones con título y botones */
				.options-header {
					display: flex;
					justify-content: space-between;
					align-items: center;
					margin-bottom: 20px;
					padding-bottom: 15px;
					/*border-bottom: 2px solid var(--mysiss-light-purple);*/
				}
				
				/* Título de la sección OPCIONES */
				.options-title {
					font-size: 1.5rem;
					font-weight: bold;
					color: var(--mysiss-purple);
				}
				
				/*Propiedades del nombre del campo en el titulo de OPCIONES */
				
				.field-name-suffix {
					color: var(--mysiss-purple);
					font-weight: bold;
					font-size: 1.3rem;
					margin-left: 0;
                }
				
				/* Tabla de opciones editable */
				.options-table {
					width: 100%;
					border-collapse: collapse;
				}
				
				/* Celdas de la tabla de opciones */
				.options-table th,
				.options-table td {
					padding: 12px;
					text-align: left;
					border-bottom: 1px solid #f0f0f0;
				}
				
				/* Anchos específicos para cada columna */
				.options-table th:nth-child(1),
				.options-table td:nth-child(1) {
					width: 20%;
					text-align: left;
				}

				.options-table th:nth-child(2),
				.options-table td:nth-child(2) {
					width: 25%;
					text-align: left;
				}

				.options-table th:nth-child(3),
				.options-table td:nth-child(3) {
					width: 17%;
					text-align: center;
				}

				.options-table th:nth-child(4),
				.options-table td:nth-child(4) {
					width: 38%;
					text-align: center;
				}

				/* Headers de la tabla de opciones */
				.options-table th {
					background-color: #f8f9fa;
					font-weight: 600;
					color: #333;
					font-size: 14px;
				}
				
				/* Efecto hover en las filas */
				.options-table tr:hover {
					background-color: #f8f9fa;
				}
				
				
				
				/* Inputs dentro de la tabla de opciones */
				.options-table input[type="text"] {
					width: 100%;
					padding: 8px;
					border: 2px solid #e1e5e9;
					border-radius: 6px;
					font-size: 14px;
					transition: all 0.3s ease;
				}

				.options-table input[type="text"]:focus {
					outline: none;
					border-color: var(--mysiss-purple);
					box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.1);
				}

				/* Checkbox dentro de la tabla de opciones */
				.options-table input[type="checkbox"] {
					transform: scale(1.5);
					cursor: pointer;
				}
				
				.options-table input[type="checkbox"]:disabled {
					transform: scale(1.5); /* Aumenta el tamaño al 150% */
					cursor: not-allowed;
					margin: 0 auto;
					display: block;
                }
				

				/* Fila editable */
				.editable-row {
					background-color: #f0f8ff;
				}

				/* Fila guardada (no editable) */
				.saved-row {
					background-color: white;
				}
				
				/* ===== BOTONES DE ACCIÓN ===== */
				.btn-action {
					padding: 6px 12px;
					border: none;
					border-radius: 6px;
					cursor: pointer;
					font-size: 12px;
					font-weight: 500;
					margin: 0 2px;
					transition: all 0.2s ease;
				}

				/* Botón editar (purple) */
				.btn-edit,
				.btn-options {
					background-color: var(--mysiss-purple);
					color: white;
				}

				.btn-edit:hover,
				.btn-options:hover{
					background-color: var(--mysiss-hover-purple);
				}

<!-- 				/* Botón eliminar (purple) */
				.btn-delete {
					background-color: var(--mysiss-purple);
					color: white;
				} -->

<!-- 				.btn-delete:hover {
					background-color: var(--mysiss-hover-purple);
				} -->

				/* Botón guardar (verde) */
				.btn-save {
					background-color: #27ae60;
					color: white;
				}

				.btn-save:hover {
					background-color: #229954; /* Verde más oscuro */
				}

				/* Botón cancelar (gris) */
				.btn-cancel {
					background-color: #95a5a6;
					color: white;
				}

				.btn-cancel:hover {
					background-color: #7f8c8d; /* Gris más oscuro */
				}
				
				/* Contenedor de botones en el header */
				.options-buttons {
					display: flex;
					gap: 10px;
				}
				
				/* Botón agregar línea */
				.btn-add-line {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 6px 12px;
					border-radius: 6px;
					font-size: 12px;
					font-weight: 500;
					cursor: pointer;
					transition: all 0.3s ease;
				}

				.btn-add-line:hover {
					background-color: var(--mysiss-hover-purple);
				}

				/* Botón salir */
				.btn-exit {
					background: var(--mysiss-purple);
					color: white;
					border: none;
					padding: 6px 12px;
					border-radius: 6px;
					font-size: 12px;
					font-weight: 500;
					cursor: pointer;
					transition: all 0.3s ease;
				}

				.btn-exit:hover {
				 background-color: var(--mysiss-hover-purple);
				}

				/* ===== ESTADO VACÍO ===== */
				.empty-state {
					text-align: center;
					padding: 50px 20px;
					color: #666;
					font-style: italic;
				}
				
				/* ===== AGREGAR CAMPO ===== */
				.AgregarCampos{
				  padding: 20px 10px;
				}

				/* ===== ANIMACIONES ===== */
				
				.fade-in {
					animation: fadeIn 0.5s ease-in;
				}

				@keyframes fadeIn {
					from { 
						opacity: 0; 
						transform: translateY(20px); /* Aparece desde abajo */
					}
					to { 
						opacity: 1; 
						transform: translateY(0); 
					}
				}
				
				@keyframes slideUp {
					from {
						opacity: 0;
						transform: translateY(20px);
					}
					to {
						opacity: 1;
						transform: translateY(0);
					}
				}

				/* ===== DISEÑO RESPONSIVO ===== */
				
				@media (max-width: 768px) {
					/* En pantallas pequeñas, formulario en una sola columna */
					.form-grid {
						grid-template-columns: 1fr;
						gap: 15px;
					}
					
					/* Sidebar más pequeño */
					.sidebar {
						width: 200px;
					}
					
					/* Ajustar margen del contenido principal */
					.main-content {
						margin-left: 200px;
						padding: 20px;
					}
                }

            </style>
        </head>

	        </a>

               <!-- Sidebar -->
                <aside class="sidebar">
				    <div class="sidebar-top">

					    <!-- Menú -->
                        <nav>
                         <a href="ConfiguracionN - institucion.html" class="nav-link" data-section="institucion"><strong>Instituciones</strong></a>

				                <h3 class="options-title">Opciones<span id="field-name-display" class="field-name-suffix"></span></h3>
				                <!-- Botones de control: Agregar línea y Salir -->
				                <div class="options-buttons">
					             <button class="btn-add-line" onclick="addOptionLine()">Agregar línea</button>
                                 <button class="btn-exit" onclick="closeOptionsSection()">Salir</button>
				                </div>
				            </div>
				            <!-- Tabla editable de opciones -->
				            <div id="optionsTableContainer">
				                <table class="options-table">
					                <thead>
						                <tr>
							             <th>Código opción</th>
                                         <th>Opción</th>
                                         <th>Activo</th>
                                         <th>Acciones</th>
							            </tr>
						            </thead>
						            <tbody id="optionsTableBody">
						             <!-- Las filas se agregarán dinámicamente aquí -->
						            </tbody>
					            </table>
				            </div>
			            </div>
			        </section>
                </main>
	        </div>
            <script>
				
				<!-- ===== VARIABLES GLOBALES ===== -->
	   
				<!--  Array para almacenar todos los registros de configuración campos  -->
				let configDataC = [
				    
					{
                        codigoCampo: '001',
                        campo: 'Estado general cuentas médicas',
                        modulo: 'Auditoría cuentas médicas',
                        activo: true,
                        obligatorio: false,
                        id: 008 // ID único fijo
                    },
					{
					    codigoCampo: '002',
                        campo: 'Estados componente medicamentos',
                        modulo: 'Auditoría concurrente',
                        activo: true,
                        obligatorio: false,
                        id: 020 // ID único fijo
					
					}
				 
				 
				 
				];
			
				<!--  Array para almacenar todos los registros de configuración opciones  -->
				let optionsData = {
				    008: [
					    {
							id:001,
							codigoOpcion: '001',
							opcion: 'Pendiente por asignar',
							activo: true,
							isEditing: false
						 
						},
						{
						    id:002,
						    codigoOpcion: '002',
						    opcion: 'Asignada',

						},

						},
						{

						    activo: true,

						{

						{

						    codigoOpcion: '006',
						    opcion: 'Finalizada',
						    activo: true,
						    isEditing: false
						
						}
					],
					020: [
					    {
							id:001,
							codigoOpcion: 'GRA',
							opcion: 'Grabado',
							activo: true,
							isEditing: false
						 
						},
						{
						    id:002,
						    codigoOpcion: 'CON',
						    opcion: 'Confirmado',
						    activo: true,
						    isEditing: false
						
						},
						{
						    id:003,
						    codigoOpcion: 'CAR',
						    opcion: 'Cargado',
						    activo: true,
						    isEditing: false
						
						},
						{
						    id:004,
						    codigoOpcion: 'REN',
						    opcion: 'Recibido',
						    activo: true,
						    isEditing: false
						
						},
						{
						    id:005,
						    codigoOpcion: 'ADM',
						    opcion: 'Administrado',
						    activo: true,
						    isEditing: false
						
						}
					]
				};
			
				<!--  Índice del registro que se está editando (-1 = no hay edición activa) se crea uno para cada sección-->
				let editingIndexC = -1;
				let currentFieldIndex = -1;
		 
				<!-- ===== REFERENCIAS A ELEMENTOS DEL DOM ===== -->
			
				<!--  Formulario campos -->
				const formC = document.getElementById('fieldsForm');
			
				<!--  Contenedor donde se renderiza la tabla campos -->
				const tableContentC = document.getElementById('tableContentC');
		 
				<!-- ===== EVENT LISTENERS ===== -->
			
				<!--  Escuchar el evento submit del formulario campos -->
				formC.addEventListener('submit', handleSubmitFc);

		
			    <!-- ===== SECCIÓN CAMPOS: MOSTRAR MODAL ===== -->
			 
			    function handleSubmitc () {
					
					const modal = document.getElementById('modal-container');
					const openBtn = document.getElementById('btn-agregar');
					const closeBtn = document.querySelector('.close');

					openBtn.addEventListener ('click',() =>{
						modal.style.display = 'flex';
					});
				
					closeBtn.addEventListener('click', () => {
						modal.style.display = 'none';
					});
					
					formC.reset();
					
					window.addEventListener('click', (e) => {
						if (e.target === modal) {
							modal.style.display = 'none';
							formC.reset();
					    }
					});
			
				}
				
			 <!-- ===== FUNCIÓN PRINCIPAL: AGREGAR REGISTRO SECCIÓN CAMPOS ===== -->
				
				function handleSubmitFc (e){
					
					e.preventDefault();
					const modal = document.getElementById('modal-container');
					// Crear objeto FormData para extraer los datos del formulario general -->
					const formDataC = new FormData(formC);
					
					//Obtiene código del campo
					const codigoCampo = formDataC.get('IdLista').trim();
					
					//Valida código duplicado
					const codigoDuplicado = configDataC.some((record, index) => {
					    //modo edición, ignora registro actual
						if (editingIndexC >= 0 && index === editingIndexC) {
						    return false;
						}
						
						return record.codigoCampo === codigoCampo;
					});
					
					if (codigoDuplicado) {
					    alert('El ID del campo: "' + codigoCampo + '" ya está registrado. Por favor ingrese un código diferente');
						return;
					}
					
				    //Crear nuevo registro con los datos del formulario general
					const newRecordC = {
						codigoCampo: formDataC.get('IdLista'),
						campo: formDataC.get('campo'),
						modulo: formDataC.get('modulo'),
						activo: formDataC.get('activoc'),
						obligatorio: formDataC.get('obligat'),
						id: Date.now() // ID único basado en timestamp
					};
				 
				    // Verificar si estamos en modo edición o modo agregar
					if (editingIndexC >= 0) {
					 <!--  MODO EDICIÓN: Actualizar registro existente -->
					 <!--  Mantener el ID original pero actualizar todos los demás campos -->
					 configDataC[editingIndexC] = { ...newRecordC, id: configDataC[editingIndexC].id };
					 editingIndexC = -1;/*Salir del modo edición*/
					}else{
					 <!--  MODO AGREGAR: Añadir nuevo registro al array -->
					 configDataC.push(newRecordC);
					 /* Inicializar array de opciones para este campo */
					 optionsData[newRecordC.id] = [];
					}
				 
				 
				    //Limpiar el formulario después de procesar
				    formC.reset();
				 
				    //Cerrar el modal
				    modal.style.display = 'none';
				 
				    //Actualizar la visualización de la tabla
				    renderTableC();
				}
				
		        <!-- ===== FUNCIÓN: RENDERIZAR LA TABLA CAMPOS ===== -->
				
		        function renderTableC(){
		         <!--  Si no hay datos, mostrar estado vacío -->
		            if (configDataC.length === 0) {
			            tableContentC.innerHTML = `
			                <div class="empty-state">
			                 No hay datos registrados. Haga clic en "Agregar" para crear un nuevo registro.
                            </div>
                        `;
                        return;
                    }
			        <!--  Generar HTML de la tabla con todos los registros de campos -->
			        const tableCHTML = `
			            <table class="data-table">
			                <thead>
                                <tr>
                                 <th>Código campo</th>
                                 <th>Campo</th>
                                 <th>Módulo</th>
                                 <th>Activo</th>
						         <th>Obligatorio</th>
						         <th>Acciones</th>
                                </tr>
				            </thead>
				            <tbody>
				                ${configDataC.map((record, index) => `
				                    <tr id="row-${record.id}" ${editingIndexC === index ? 'style="background-color: #f0f8ff;"' : ''}>
					                    <!--Para cada celda, mostrar input si está en modo edición, sino mostrar el valor-->
				                        <td>${editingIndexC === index ? `<input type="text" class="edit-input" value="${record.codigoCampo}" data-field="codigoCampo">` :record.codigoCampo}</td>
					                    <td>${editingIndexC === index ? `<input type="text" class="edit-input" value="${record.campo}" data-field="campo">` :record.campo}</td>
							            <td>${editingIndexC === index ? `
							                <select class="edit-input" data-field="modulo"> 
							                 <option value= "Auditoría de calidad" ${record.modulo === 'Auditoría de calidad' ? 'selected' : ''}>Auditoría de calidad</option>
									         <option value="Auditoría concurrente" ${record.modulo === 'Auditoría concurrente' ? 'selected' : ''}>Auditoría concurrente</option>
									          <option value="Auditoría cuentas médicas" ${record.modulo === 'Auditoría cuentas médicas' ? 'selected' : ''}>Auditoría cuentas médicas</option>
								            </select>	
							                ` :record.modulo}
								        </td>
							            <td>${editingIndexC === index ? `<input type="checkbox" class="edit-input" ${record.activo ? 'checked' : ''} data-field="activo">` : `<input type="checkbox" ${record.activo ? 'checked' : ''} disabled>`}</td>
							            <td>${editingIndexC === index ? `<input type="checkbox" class="edit-input" ${record.obligatorio ? 'checked' : ''} data-field="obligatorio">` : `<input type="checkbox" ${record.obligatorio ? 'checked' : ''} disabled>`}</td>
					                    <td>
					                        <!-- Mostrar botones diferentes según el modo (Edición) -->
						                    ${editingIndexC === index ?`
								             <button class="btn-action btn-save" onclick="saveEditC(${index})">Guardar</button>
						                     <button class="btn-action btn-cancel" onclick="cancelEditC()">Cancelar</button>
								            `:`
						                     <!-- Mostrar botones diferentes según el modo (Normal) -->
						                     <button class="btn-action btn-edit" onclick="editRecordC(${index})">Editar</button>
						                     <!-- <button class="btn-action btn-delete" onclick="deleteC(${index})">Eliminar</button> -->
									         <button class="btn-action btn-options" onclick="optionsC(${index})">Opciones</button>
									        `}
						                </td>
					                </tr>
				                `).join('')}
				            </tbody>
				        </table>
			        `;
		           <!-- Insertar el html generado en el contenedor de plantillas -->
			       tableContentC.innerHTML=tableCHTML;
		        }
				
		        <!-- ===== FUNCIÓN: INICIAR EDICIÓN DE UN REGISTRO CAMPOS ===== -->
				
                function editRecordC(index) {
		         <!--  Establecer el indice de edición -->
                 editingIndexC = index;
			     <!--  Volver a renderizar la tabla para los inputs de edición -->
                 renderTableC();
                }
		
                <!-- ===== FUNCIÓN: CANCELAR EDICIÓN DEL REGISTRO CAMPOS ===== -->
				
                function cancelEditC() {
			     <!--  Salir del modo edición index -1 -->
                 editingIndexC = -1;
            
                 <!--  Volver a renderizar la tabla estado normal -->
                 renderTableC();
                }
				
		        <!-- ===== FUNCIÓN: GUARDAR EDICIÓN DEL REGISTRO CAMPOS ===== -->
				
		        function saveEditC(index) {
		            
					<!-- Obtener fila que se está editando -->
                    const row = document.getElementById(`row-${configDataC[index].id}`);
                    <!--  Obtener los inputs de edición de la fila obtenida -->
                    const inputs = row.querySelectorAll('.edit-input');
                    
					<!-- Objeto temporal para almacenar los valores -->
					const tempData = {};
					
					<!--  Actualizar el registro con las ediciones -->
                    inputs.forEach(input => {
                        const field = input.getAttribute('data-field'); // Obtener el nombre del campo
				        if(field === 'activo' || field ==='obligatorio'){
				            tempData[field] = input.checked;
				        }else{
							tempData[field] = input.value.trim();
				        }
                    });
					
					if (!tempData.codigoCampo) {
						alert('"Código campo" obligatorio');
						return;
					}
					if (!tempData.campo) {
						alert('"Campo" obligatorio');
						return;
					}
					if (!tempData.modulo) {
						alert('"Módulo" obligatorio');
						return;
					}
					
					<!--  Valida código duplicado -->
					const codigoDuplicado = configDataC.some((record, idx) => {
					    <!--  Ignora el registro actual -->
						if (idx === index) return false;
						return record.codigoCampo === tempData.codigoCampo;
				
					});
					
					if (codigoDuplicado) {
					    alert('El ID del campo: "' + tempData.codigoCampo + '" ya está registrado. Por favor ingrese un código diferente');
					    return;
					}
					
					<!-- Actualiza registro con los valores validados --> 
					configDataC[index].codigoCampo = tempData.codigoCampo;
					configDataC[index].campo = tempData.campo;
					configDataC[index].modulo = tempData.modulo;
					configDataC[index].activo = tempData.activo;
					configDataC[index].obligatorio = tempData.obligatorio;
					
			        <!--  Salir del modo edición actualizando el index -->
                    editingIndexC = -1;
                    <!--  Volver a renderizar la tabla -->
                    renderTableC();
                }
		
		        <!-- ===== FUNCIÓN ELIMINAR REGISTRO CAMPOS ===== -->
				
                <!-- function deleteC(index) { -->
		           <!--  Confirmación -->
                    <!-- if (confirm('¿Desea eliminar este registro?')) { -->
			         <!--  Obtener el ID del campo antes de eliminarlo -->
			         <!-- const fieldId = configDataC[index].id; -->
			 
			         <!--  Eliminar las opciones asociadas a este campo -->
			         <!-- delete optionsData[fieldId]; -->
			 
		             <!--  Eliminar registro -->
                     <!-- configDataC.splice(index, 1); -->
			 
			         <!--  Quitar sección opciones -->
			         <!-- const optionsSection = document.getElementById('options-section'); -->
		             <!-- optionsSection.style.display = 'none'; -->
			
                     <!--  Volver a renderizar la tabla -->
                     <!-- renderTableC(); -->
                    <!-- } -->
                <!-- } -->
		
		        <!-- ===== FUNCIÓN: CERRAR SECCIÓN DE OPCIONES ===== -->
				
			    function closeModal (){
		         const modal = document.getElementById('modal-container');
		         modal.style.display = 'none';
		         formC.reset();
		
		        }
		
		        <!-- ===== FUNCIÓN: MOSTRAR SECCIÓN DE OPCIONES ===== -->
				
				function optionsC (index) {
				
				 const fieldName = configDataC[index].campo;
                 const fieldNameDisplay = document.getElementById('field-name-display');
                 fieldNameDisplay.textContent = ' - ' + fieldName;
				 
		         <!-- Guardar el índice del campo cuyas opciones se están editando -->
                 currentFieldIndex = index;
		         <!-- Obtener el ID del campo -->
		         const fieldId = configDataC[index].id;
		            <!-- Inicializar el array de opciones si no existe  -->
		            if (!optionsData[fieldId]){
		             optionsData[fieldId] = [];
			        }
				 <!-- Mostrar sección opciones  -->
		         const optionsSection = document.getElementById('options-section');
		         optionsSection.style.display = 'block';
				 <!-- Renderizar tabla opciones  -->
		         renderOptionsTable();
		         <!-- Hacer scroll hacia la tabla opciones  -->
		         optionsSection.scrollIntoView({ behavior: 'smooth' });
		        }
		
		        <!-- ===== FUNCIÓN: CERRAR SECCIÓN DE OPCIONES ===== -->
				
		        function closeOptionsSection (){
		         const optionsSection = document.getElementById('options-section');
		         optionsSection.style.display = 'none';
				 const fieldNameDisplay = document.getElementById('field-name-display');
                 fieldNameDisplay.textContent = '';
		         currentFieldIndex = -1;
		        }
		
		        <!-- ===== FUNCIÓN: AGREGAR LÍNEA SECCIÓN DE OPCIONES ===== -->
				
		        function addOptionLine() {
		         <!-- Verificar que haya un campo seleccionado  -->
		         if (currentFieldIndex < 0) return;
		 		 <!-- Verificar que haya un campo seleccionado  -->
		         const fieldId = configDataC[currentFieldIndex].id; 
		            <!-- Crear nueva opción editable  -->
		            const newOption = {
                      id: Date.now(),
                      codigoOpcion: '',
                      opcion: '',
                      activo: false,
                      isEditing: true // Marca que está en modo edición
                    };
                 <!-- Agregar al array de opciones  -->
		         optionsData[fieldId].push(newOption); 
		         <!-- Renderizar la tabla actualizada  -->
		         renderOptionsTable();
		        }
		
		        <!-- ===== FUNCIÓN RENDERIZAR TABLA OPCIONES ===== -->
				
		        function renderOptionsTable(){
		         <!-- Verificar que haya un campo seleccionado  -->
		         if (currentFieldIndex < 0) return;
		         <!-- Obtener el ID del campo actual -->
		         const fieldId = configDataC[currentFieldIndex].id;
		         <!-- Obtener las opciones del campo actual -->
		         const options = optionsData[fieldId] || [];
		         <!-- Obtener el contenedor del cuerpo de la tabla -->
		         const tableBody = document.getElementById('optionsTableBody');
		            <!-- Si no hay opciones, mostrar mensaje -->
		            if (options.length === 0) {
                        tableBody.innerHTML = `
                            <tr>
                                <td colspan="4" style="text-align: center; color: #666; font-style: italic;">
                                  No hay opciones. Haga clic en "Agregar línea" para crear una.
                                </td>
                            </tr>
                        `;
                        return;

                    }
		
		            <!-- Generar HTML para cada opción -->
		            tableBody.innerHTML = options.map((option, index) => {
		                <!-- Si la opción está en modo edición, mostrar inputs -->
		                if (option.isEditing) {
		                    return `
			                    <tr class="editable-row" id="option-row-${option.id}">
				                    <td>
					                 <input type="text" value="${option.codigoOpcion}" data-field="codigoOpcion" placeholder="Código">
					                </td>
					                <td>
					                 <input type="text" value="${option.opcion}" data-field="opcion" placeholder="Descripción">
					                </td>
					                <td style="text-align: center;">
					                 <input type="checkbox" ${option.activo ? 'checked' : ''} data-field="activo">
					                </td>
					                <td>
					                 <button class="btn-action btn-save" onclick="saveOption(${index})">Guardar</button>
					                </td>
				                </tr>
		                    `;
		                } else{
			                <!-- Si está guardada, mostrar valores y botones de editar/eliminar -->
			                return `
			                    <tr class="saved-row" id="option-row-${option.id}">
				                 <td>${option.codigoOpcion}</td>
					             <td>${option.opcion}</td>
					                <td style="text-align: center;">
					                 <input type="checkbox" ${option.activo ? 'checked' : ''} disabled>
					                </td>
						            <td>
						             <button class="btn-action btn-edit" onclick="editOption(${index})">Editar</button>
						             <!-- <button class="btn-action btn-delete" onclick="deleteOption(${index})">Eliminar</button> -->
						            </td>
					            </tr>
				            `;
			            }
		 
		            }).join('');
		
		        }
		
		        <!-- ===== FUNCIÓN GUARDAR OPCIÓN ===== -->
				
		        <!-- Se ejecuta al hacer clic en "Guardar" en una fila editable -->
		        function saveOption(index) {
		            
					<!-- Obtener el ID del campo actual -->
		            const fieldId = configDataC[currentFieldIndex].id;
		            const option = optionsData[fieldId][index];
		            <!-- Obtener la fila de la tabla -->
		            const row = document.getElementById(`option-row-${option.id}`);
		            <!-- Obtener todos los inputs de la fila -->
		            const inputs = row.querySelectorAll('input[data-field]');
					
					<!-- Objeto temporal para almacenar valores -->
					const tempOptionData = {};
					
		            <!-- Actualizar los valores de la opción -->
		            inputs.forEach(input => {
		                const field = input.getAttribute('data-field');
			            if (field === 'activo') {
							tempOptionData[field] = input.checked;
				        } else {
							tempOptionData[field] = input.value.trim();
				        }
		            });
					
					<!-- Validar campos obligatorios -->
					if (!tempOptionData.codigoOpcion) {
					    alert('El campo "Código opción" es obligatorio');
						return;
					}
					
					if (!tempOptionData.opcion) {
					    alert('El campo "Opción" es obligatorio');
						return;
					}
					
					<!-- Valida código de opción duplicado --> 
					const codigoOpcionDuplicado = optionsData[fieldId].some((opt, idx) => {
					    <!-- Ignora opción actual -->
					    if (idx === index) return false;
						return opt.codigoOpcion === tempOptionData.codigoOpcion;
					});
					
					if (codigoOpcionDuplicado) {
					    alert('El ID de la opción: "' + tempOptionData.codigoOpcion + '" ya está registrado. Por favor ingrese un código diferente');
						return;
				    }
					
					<!-- Actualiza valores validados -->
					option.codigoOpcion = tempOptionData.codigoOpcion;
					option.opcion = tempOptionData.opcion;
					option.activo = tempOptionData.activo;
					
			        <!-- Marcar como no editable -->
			        option.isEditing = false;			
			        <!-- Renderizar la tabla actualizada -->
			        renderOptionsTable();
		        }
		
				<!-- ===== FUNCIÓN EDITAR OPCIÓN ===== -->
				
				function editOption (index){
				 <!-- Verificar que haya un campo seleccionado  -->
				 if (currentFieldIndex < 0) return;  
				 <!-- Se obtiene el id de la fila  -->
				 const fieldId = configDataC[currentFieldIndex].id;	  
				 <!-- Se pone la fila obtenida en modo edición  -->
				 optionsData[fieldId][index].isEditing = true;
				 <!-- Se reenderiza la tabla opciones  -->
				 renderOptionsTable();
				}
		
		        <!-- ===== FUNCIÓN ELIMINAR OPCIÓN ===== -->
		        function deleteOption(index) {
		         <!-- Verificar que haya un campo seleccionado  -->
		         if (currentFieldIndex < 0) return;
		  
		            <!-- Mensaje de confirmación  -->
		            if (confirm('¿Está seguro de que desea eliminar esta opción?')) {
			
			         <!-- Se obtiene el id de la fila  -->
                     const fieldId = configDataC[currentFieldIndex].id;
			 
			         <!-- Se elimina la fila obtenida  -->
                     optionsData[fieldId].splice(index, 1);
			 
			         <!-- Se reenderiza la tabla opciones  -->
                     renderOptionsTable();
			        }
		        }
				
				renderTableC();
		
            </script>
        </body>
    </html>
