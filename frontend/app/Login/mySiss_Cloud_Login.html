<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Medical Fees mySiss</title>
    <link rel="stylesheet" href="../css/mySiss_Cloud_Login.css">
</head>
<body>
    <div class="container">
        <h1>mySiss</h1>
        <label for="usuario">Usuario o email:</label><br>
        <input type="text" id="usuario" autocomplete="off"><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password"><br><br>

        <label class="remember-label"><input type="checkbox" id="rememberMe"> Recordar mis datos</label><br><br>

        <button class="button" onclick="login()">Ingresar</button>
        <p id="mensaje" class="error-message"></p>
        <a href="#" class="enlace-contrasena" onclick="openRecoveryModal()">Olvidaste contraseña</a>
    </div>

    <button class="logout" onclick="location.reload()">Salir</button>

    <div id="recoveryModal" class="modal">
        <div class="modal-content">
            <h3>Recuperar Contraseña</h3>
            <p>Ingresa tu correo registrado</p>
            <input type="email" id="recoveryInput" class="modal-input" placeholder="Correo electrónico">
            <p id="recoveryMessage" class="msg-inline"></p>
            <button class="modal-button" onclick="sendRecoveryEmail()">Enviar</button>
            <button class="modal-button" onclick="closeRecoveryModal()">Cancelar</button>
        </div>
    </div>

    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <h3>Validar Token</h3>
            <input type="text" id="tokenInput" class="modal-input" placeholder="Token recibido por correo">
            <p id="tokenMessage" class="msg-inline"></p>
            <button class="modal-button" onclick="validateTokenStep()">Validar</button>
            <button class="modal-button" onclick="closeTokenModal()">Cancelar</button>
        </div>
    </div>

    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h3>Nueva contraseña</h3>
            <input type="password" id="newPasswordInput" class="modal-input" placeholder="Nueva contraseña">
            <input type="password" id="confirmPasswordInput" class="modal-input" placeholder="Confirmar contraseña">
            <p id="resetMessage" class="msg-inline"></p>
            <button class="modal-button" onclick="resetPasswordStep()">Actualizar</button>
            <button class="modal-button" onclick="closeResetModal()">Cancelar</button>
        </div>
    </div>

    <script src="/csp/mySissCloud/app/js/services/config.js"></script>
    <script src="/csp/mySissCloud/app/js/services/api.js"></script>
    <script src="/csp/mySissCloud/app/js/services/session.js"></script>
    <script src="/csp/mySissCloud/app/js/services/auth.js"></script>
    <script src="../js/mySiss_Cloud_Login.js"></script>
</body>
</html>
