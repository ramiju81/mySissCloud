<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mySiss – WebService Ejecución</title>
  <link rel="stylesheet" href="../../css/mySiss_WebService.css">
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo" style="font-size:2rem;font-weight:800;color:#800080;text-align:center;margin-bottom:1.5rem">mySiss</div>
      <a href="mySissWSMaster.html" class="nav-link focus-outline">WebService</a>
      <a href="mySissWSEjecucion.html" class="nav-link focus-outline">Ejecución</a>
      <a href="mySissWSIntegracion.html" class="nav-link focus-outline">Integración</a>
    </div>
  </aside>
  <main class="main-content" style="margin-left:190px;padding:28px;flex:1">
    <h2 style="color:#800080;margin-bottom:12px">Ejecución de Integraciones</h2>
    <p id="wsError" style="color:#b91c1c"></p>
    <form id="executionForm" style="display:grid;gap:8px;max-width:920px">
      <select id="execIntegration"></select>
      <select id="execClient"></select>
      <textarea id="execBody" rows="6" placeholder='Body para POST (opcional JSON)'></textarea>
      <button>Ejecutar integración</button>
    </form>
    <h3 style="margin-top:16px">Resultado</h3>
    <pre id="execResult" style="background:#f3f4f6;padding:12px;border-radius:8px"></pre>

    <h3 style="margin-top:16px">Logs recientes</h3>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr><th>ID Log</th><th>Fecha</th><th>Estado</th><th>HTTP</th><th>Mensaje</th></tr></thead>
      <tbody id="logsBody"></tbody>
    </table>
  </main>
</div>
<script src="/csp/mySissCloud/app/services/config.js"></script>
<script src="/csp/mySissCloud/app/services/api.js"></script>
<script src="/csp/mySissCloud/app/services/routing.js"></script>
<script src="/csp/mySissCloud/app/services/module-guard.js"></script>
<script src="/csp/mySissCloud/app/assets/js/mysiss_webservice_admin.js"></script>
</body>
</html>
